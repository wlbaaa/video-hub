<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Chat Hub</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: oklch(0.97 0.004 260);
  --surface: oklch(1 0 0);
  --surface-2: oklch(0.96 0.004 260);
  --accent: oklch(0.58 0.20 160);
  --accent-hover: oklch(0.52 0.18 160);
  --danger: oklch(0.55 0.22 20);
  --text: oklch(0.15 0.01 260);
  --text-secondary: oklch(0.50 0.01 260);
  --text-muted: oklch(0.65 0.01 260);
  --border: oklch(0.89 0.005 260);
  --bubble-self: oklch(0.68 0.16 160);
  --bubble-other: oklch(1 0 0);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-full: 999px;
  --font: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', system-ui, sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.06);
  --shadow-md: 0 4px 16px oklch(0 0 0 / 0.08);
}

html, body {
  height: 100%;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: var(--font);
  background: oklch(0.20 0.02 260);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
}

.app-container {
  width: 100%;
  max-width: 480px;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
}

@media (min-width: 481px) {
  .app-container {
    height: min(100vh - 32px, 900px);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 40px oklch(0 0 0 / 0.3);
  }
}

/* ========= HEADER ========= */
.header {
  background: var(--surface);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}

.header .back-btn {
  width: 36px; height: 36px;
  border: none; background: none;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
  flex-shrink: 0;
}
.header .back-btn:active { background: var(--surface-2); }

.header .avatar-sm {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, oklch(0.65 0.18 260), oklch(0.60 0.16 290));
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}

.header-info { flex: 1; min-width: 0; }
.header-name { font-size: 16px; font-weight: 600; }
.header-status { font-size: 11px; color: var(--text-muted); }

/* ========= AUTH VIEW ========= */
.auth-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 28px;
  gap: 20px;
}

.auth-view .logo {
  width: 72px; height: 72px;
  border-radius: 20px;
  background: linear-gradient(135deg, var(--accent), oklch(0.65 0.18 250));
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; color: white;
  margin-bottom: 4px;
}

.auth-view h2 { font-size: 22px; font-weight: 700; }
.auth-view p { font-size: 13px; color: var(--text-secondary); text-align: center; }

.input-group {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.input-group input {
  width: 100%; height: 48px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0 16px;
  font-family: var(--font);
  font-size: 15px;
  outline: none;
  background: var(--surface);
  color: var(--text);
  transition: border-color 0.2s;
}

.input-group input:focus {
  border-color: var(--accent);
}

.input-group input::placeholder { color: var(--text-muted); }

.btn {
  width: 100%; height: 48px;
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.12s, opacity 0.12s;
  -webkit-tap-highlight-color: transparent;
}

.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--accent);
  color: white;
}

.btn-outline {
  background: transparent;
  color: var(--accent);
  border: 1.5px solid var(--accent);
}

.btn-text {
  background: none;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  height: auto;
  width: auto;
}

.auth-error {
  color: var(--danger);
  font-size: 13px;
  text-align: center;
  min-height: 18px;
}

/* ========= CONTACTS VIEW ========= */
.contacts-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.search-bar {
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.search-input {
  width: 100%; height: 36px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  padding: 0 14px;
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  color: var(--text);
}

.search-input::placeholder { color: var(--text-muted); }

.contact-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.contact-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.contact-item:active { background: var(--surface-2); }

.contact-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, oklch(0.65 0.18 260), oklch(0.60 0.16 290));
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.contact-info { flex: 1; min-width: 0; }
.contact-name { font-size: 15px; font-weight: 600; }
.contact-preview {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.contact-badge {
  min-width: 20px; height: 20px;
  background: var(--danger);
  color: white;
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  padding: 0 6px;
}

.empty-contacts {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-muted);
  text-align: center;
  gap: 8px;
  font-size: 14px;
}

.panel-actions {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.panel-actions .btn {
  flex: 1;
  height: 40px;
  font-size: 13px;
}

/* ========= CHAT VIEW ========= */
.chat-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.time-divider {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  padding: 8px 0;
}

.message-row {
  display: flex;
  flex-direction: column;
  max-width: 75%;
  animation: msgIn 0.25s ease-out;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-row.self { align-self: flex-end; }
.message-row.other { align-self: flex-start; }

.bubble {
  padding: 9px 14px;
  border-radius: var(--radius-md);
  font-size: 15px;
  line-height: 1.5;
  word-break: break-word;
}

.message-row.self .bubble {
  background: var(--bubble-self);
  color: white;
  border-bottom-right-radius: 4px;
}

.message-row.other .bubble {
  background: var(--bubble-other);
  color: var(--text);
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow-sm);
}

.message-time {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
  padding: 0 4px;
}

.message-row.self .message-time { text-align: right; }

.chat-input-area {
  background: var(--surface);
  padding: 8px 12px calc(8px + var(--safe-bottom));
  display: flex;
  gap: 8px;
  border-top: 1px solid var(--border);
  align-items: flex-end;
}

.chat-input-area textarea {
  flex: 1;
  border: none;
  background: var(--surface-2);
  border-radius: var(--radius-lg);
  padding: 9px 14px;
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.4;
  outline: none;
  resize: none;
  max-height: 100px;
  min-height: 20px;
  height: 20px;
  color: var(--text);
}

.chat-input-area textarea::placeholder { color: var(--text-muted); }

.chat-input-area textarea:focus {
  box-shadow: 0 0 0 2px oklch(0.68 0.16 160 / 0.3);
}

.send-btn {
  width: 38px; height: 38px;
  border: none;
  background: var(--accent);
  color: white;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.12s, opacity 0.12s;
  opacity: 0.4;
}

.send-btn:not(:disabled) { opacity: 1; }
.send-btn:not(:disabled):active { transform: scale(0.9); }

/* ========= MODAL ========= */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: oklch(0 0 0 / 0.5);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.2s;
}

@keyframes fadeIn { from { opacity: 0; } }

.modal-sheet {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(20px + var(--safe-bottom));
  animation: slideUp 0.25s ease-out;
}

@keyframes slideUp { from { transform: translateY(100%); } }

.modal-sheet h3 {
  font-size: 17px;
  font-weight: 650;
  margin-bottom: 16px;
  text-align: center;
}

.modal-sheet .input-group { margin-bottom: 16px; }

.modal-sheet .modal-actions {
  display: flex;
  gap: 10px;
}

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  color: var(--text-muted);
  font-size: 14px;
}

.spinner {
  width: 24px; height: 24px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 10px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none !important; }

@media (max-width: 360px) {
  .message-row { max-width: 82%; }
  .bubble { font-size: 14px; padding: 8px 12px; }
}

@media (prefers-reduced-motion: reduce) {
  .message-row { animation: none; }
  .modal-sheet { animation: none; }
}
</style>
</head>
<body>

<div class="app-container" id="app">

  <!-- ===== AUTH VIEW ===== -->
  <div id="authView" class="auth-view">
    <div class="logo">💬</div>
    <h2>Chat Hub</h2>
    <p>真人实时聊天，邀请好友一起聊</p>
    <div class="input-group">
      <input type="text" id="authUsername" placeholder="用户名（注册后不可改）" maxlength="20">
      <input type="password" id="authPassword" placeholder="密码（至少6位）" maxlength="50">
    </div>
    <p class="auth-error" id="authError"></p>
    <button class="btn btn-primary" id="btnLogin">登录</button>
    <button class="btn btn-outline" id="btnRegister">注册新账号</button>
  </div>

  <!-- ===== CONTACTS VIEW ===== -->
  <div id="contactsView" class="contacts-view hidden">
    <div class="header">
      <div class="avatar-sm" id="myAvatar"></div>
      <div class="header-info">
        <div class="header-name" id="myName"></div>
        <div class="header-status">在线</div>
      </div>
      <button class="btn btn-outline" style="width:auto;height:32px;font-size:12px;padding:0 12px;" id="btnLogout">退出</button>
    </div>
    <div id="contactList" class="contact-list">
      <div class="loading"><div class="spinner"></div>加载中...</div>
    </div>
    <div class="panel-actions">
      <button class="btn btn-primary" id="btnAddFriend">添加好友</button>
    </div>
  </div>

  <!-- ===== CHAT VIEW ===== -->
  <div id="chatView" class="chat-view hidden">
    <div class="header">
      <button class="back-btn" id="btnBack">&larr;</button>
      <div class="avatar-sm" id="chatAvatar"></div>
      <div class="header-info">
        <div class="header-name" id="chatName"></div>
        <div class="header-status" id="chatStatus">在线</div>
      </div>
    </div>
    <div id="messagesArea" class="messages-area"></div>
    <div class="chat-input-area">
      <textarea id="chatInput" rows="1" placeholder="输入消息..." maxlength="1000"></textarea>
      <button class="send-btn" id="chatSendBtn" disabled>&#10148;</button>
    </div>
  </div>

  <!-- ===== MODAL ===== -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-sheet">
      <h3 id="modalTitle">添加好友</h3>
      <div class="input-group">
        <input type="text" id="modalInput" placeholder="输入对方用户名">
      </div>
      <p class="auth-error" id="modalError"></p>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btnModalCancel">取消</button>
        <button class="btn btn-primary" id="btnModalConfirm">确认</button>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// SUPABASE CONFIG - Replace with your own Supabase project URL and anon key
// 1. Go to https://supabase.com → New Project
// 2. Copy URL and anon key from Settings → API
// 3. Go to SQL Editor and run the setup SQL below:
// ============================================================
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

// ---- SQL to run in Supabase SQL Editor ----
/*
-- Enable UUID extension
CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

-- Profiles table
CREATE TABLE profiles (
  id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
  username TEXT UNIQUE NOT NULL,
  created_at TIMESTAMPTZ DEFAULT now()
);

-- Friends table (bidirectional friendship)
CREATE TABLE friendships (
  id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  friend_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  created_at TIMESTAMPTZ DEFAULT now(),
  UNIQUE(user_id, friend_id)
);

-- Messages table
CREATE TABLE messages (
  id BIGSERIAL PRIMARY KEY,
  sender_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  receiver_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  content TEXT NOT NULL,
  created_at TIMESTAMPTZ DEFAULT now()
);

-- Index for message queries
CREATE INDEX idx_messages_conversation ON messages(
  LEAST(sender_id, receiver_id),
  GREATEST(sender_id, receiver_id),
  created_at DESC
);

-- Enable Realtime for messages
ALTER PUBLICATION supabase_realtime ADD TABLE messages;

-- Enable Row Level Security
ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;
ALTER TABLE friendships ENABLE ROW LEVEL SECURITY;
ALTER TABLE messages ENABLE ROW LEVEL SECURITY;

-- RLS policies
CREATE POLICY "Public profiles are viewable by everyone" ON profiles FOR SELECT USING (true);
CREATE POLICY "Users can insert their own profile" ON profiles FOR INSERT WITH CHECK (auth.uid() = id);

CREATE POLICY "Users can view their friendships" ON friendships FOR SELECT
  USING (auth.uid() = user_id OR auth.uid() = friend_id);
CREATE POLICY "Users can create friendships" ON friendships FOR INSERT
  WITH CHECK (auth.uid() = user_id);

CREATE POLICY "Users can view their messages" ON messages FOR SELECT
  USING (auth.uid() = sender_id OR auth.uid() = receiver_id);
CREATE POLICY "Users can insert their messages" ON messages FOR INSERT
  WITH CHECK (auth.uid() = sender_id);
*/
// ============================================================

(function() {
  // DOM refs
  const app = document.getElementById('app');
  const authView = document.getElementById('authView');
  const contactsView = document.getElementById('contactsView');
  const chatView = document.getElementById('chatView');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalTitle = document.getElementById('modalTitle');
  const modalInput = document.getElementById('modalInput');
  const modalError = document.getElementById('modalError');

  let supabase = null;
  let currentUser = null;
  let profile = null;
  let friends = [];
  let currentChat = null;
  let messageSubscription = null;
  let presenceSubscription = null;

  const needConfig = SUPABASE_URL === 'YOUR_SUPABASE_URL';

  // ==================== INIT ====================
  if (needConfig) {
    authView.innerHTML = `
      <div class="logo">⚙️</div>
      <h2>需要配置 Supabase</h2>
      <p style="text-align:left;font-size:13px;line-height:1.8;">
        1. 前往 <a href="https://supabase.com" target="_blank" style="color:var(--accent);">supabase.com</a> 注册并创建项目<br>
        2. 打开此文件，找到顶部 <code>SUPABASE_URL</code> 和 <code>SUPABASE_KEY</code><br>
        3. 替换为你的 Supabase 项目 URL 和 anon key<br>
        4. 在 Supabase SQL Editor 中运行文件中的建表 SQL<br>
        5. 重新部署即可
      </p>`;
    return;
  }

  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ==================== AUTH ====================
  document.getElementById('btnLogin').addEventListener('click', async () => {
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value;
    if (!username || password.length < 6) {
      setAuthError('请输入用户名和密码（密码至少6位）');
      return;
    }
    setAuthError('');
    const email = `${username}@chathub.local`;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      setAuthError('用户名或密码错误，或该账号不存在');
    } else {
      await initApp();
    }
  });

  document.getElementById('btnRegister').addEventListener('click', async () => {
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value;
    if (!username || password.length < 6) {
      setAuthError('请输入用户名和密码（密码至少6位）');
      return;
    }
    if (!/^[a-zA-Z0-9_\u4e00-\u9fff]{2,20}$/.test(username)) {
      setAuthError('用户名2-20位，限中英文、数字、下划线');
      return;
    }
    setAuthError('');
    const email = `${username}@chathub.local`;

    // Sign up
    const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });
    if (authError) { setAuthError(authError.message); return; }
    if (!authData.user) { setAuthError('注册失败，请重试'); return; }

    // Create profile
    const { error: profileError } = await supabase.from('profiles').insert({
      id: authData.user.id,
      username: username
    });
    if (profileError) {
      // Cleanup: sign out if profile creation fails
      await supabase.auth.signOut();
      if (profileError.message.includes('duplicate')) {
        setAuthError('该用户名已被占用');
      } else {
        setAuthError('创建用户资料失败：' + profileError.message);
      }
      return;
    }

    await initApp();
  });

  function setAuthError(msg) {
    document.getElementById('authError').textContent = msg;
  }

  // ==================== APP INIT ====================
  async function initApp() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
      showAuth();
      return;
    }
    currentUser = user;

    // Get profile
    const { data: prof } = await supabase.from('profiles').select('*').eq('id', user.id).single();
    if (!prof) {
      await supabase.auth.signOut();
      showAuth();
      return;
    }
    profile = prof;

    showContacts();
    await loadFriends();
    await setupRealtime();
  }

  // ==================== VIEW SWITCHING ====================
  function showAuth() {
    authView.classList.remove('hidden');
    contactsView.classList.add('hidden');
    chatView.classList.add('hidden');
  }

  function showContacts() {
    authView.classList.add('hidden');
    contactsView.classList.remove('hidden');
    chatView.classList.add('hidden');
    document.getElementById('myName').textContent = profile.username;
    document.getElementById('myAvatar').textContent = profile.username.charAt(0).toUpperCase();
  }

  function showChat(friend) {
    currentChat = friend;
    contactsView.classList.add('hidden');
    chatView.classList.remove('hidden');
    document.getElementById('chatName').textContent = friend.username;
    document.getElementById('chatAvatar').textContent = friend.username.charAt(0).toUpperCase();
    document.getElementById('messagesArea').innerHTML = '';
    document.getElementById('chatInput').value = '';
    document.getElementById('chatSendBtn').disabled = true;
    loadMessages();
    subscribeMessages();
  }

  function showModal(title, placeholder, onConfirm) {
    modalOverlay.classList.remove('hidden');
    modalTitle.textContent = title;
    modalInput.value = '';
    modalInput.placeholder = placeholder;
    modalError.textContent = '';
    modalInput.focus();

    const confirmBtn = document.getElementById('btnModalConfirm');
    const cancelBtn = document.getElementById('btnModalCancel');

    const cleanup = () => {
      modalOverlay.classList.add('hidden');
      confirmBtn.removeEventListener('click', handler);
      cancelBtn.removeEventListener('click', cleanup);
    };

    const handler = async () => {
      await onConfirm(modalInput.value.trim());
    };

    confirmBtn.addEventListener('click', handler);
    cancelBtn.addEventListener('click', cleanup);

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) cleanup();
    });
  }

  // ==================== FRIENDS ====================
  async function loadFriends() {
    if (!currentUser) return;

    const { data: rows, error } = await supabase
      .from('friendships')
      .select('id, user_id, friend_id, friend:friend_id(id, username), user:user_id(id, username)')
      .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`);

    if (error) { console.error(error); return; }

    friends = rows.map(r => {
      if (r.user_id === currentUser.id) return { friendship_id: r.id, ...r.friend };
      return { friendship_id: r.id, ...r.user };
    });

    renderContactList();
  }

  function renderContactList() {
    const container = document.getElementById('contactList');
    if (friends.length === 0) {
      container.innerHTML = `
        <div class="empty-contacts">
          <div style="font-size:40px;">👋</div>
          <div>暂无好友</div>
          <div style="font-size:12px;">点击下方「添加好友」开始聊天</div>
        </div>`;
      return;
    }

    container.innerHTML = friends.map(f => `
      <div class="contact-item" data-id="${f.id}">
        <div class="contact-avatar">${(f.username || '?').charAt(0).toUpperCase()}</div>
        <div class="contact-info">
          <div class="contact-name">${f.username || 'Unknown'}</div>
          <div class="contact-preview">点击开始聊天</div>
        </div>
      </div>
    `).join('');

    container.querySelectorAll('.contact-item').forEach(el => {
      el.addEventListener('click', () => {
        const friend = friends.find(f => f.id === el.dataset.id);
        if (friend) showChat(friend);
      });
    });
  }

  // ==================== ADD FRIEND ====================
  document.getElementById('btnAddFriend').addEventListener('click', () => {
    showModal('添加好友', '输入对方的用户名', async (username) => {
      if (!username) { modalError.textContent = '请输入用户名'; return; }
      if (username === profile.username) { modalError.textContent = '不能添加自己为好友'; return; }

      const { data: target, error } = await supabase
        .from('profiles')
        .select('id, username')
        .eq('username', username)
        .maybeSingle();

      if (error || !target) {
        modalError.textContent = '找不到该用户';
        return;
      }

      // Check if already friends
      const exists = friends.find(f => f.id === target.id);
      if (exists) {
        modalError.textContent = '你们已经是好友了';
        return;
      }

      const { error: insertErr } = await supabase.from('friendships').insert({
        user_id: currentUser.id,
        friend_id: target.id
      });

      if (insertErr) {
        modalError.textContent = '添加失败：' + insertErr.message;
        return;
      }

      modalOverlay.classList.add('hidden');
      await loadFriends();
    });
  });

  // ==================== MESSAGES ====================
  async function loadMessages() {
    if (!currentChat) return;
    const { data, error } = await supabase
      .from('messages')
      .select('*')
      .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentChat.id}),and(sender_id.eq.${currentChat.id},receiver_id.eq.${currentUser.id})`)
      .order('created_at', { ascending: true })
      .limit(100);

    if (error) return;
    renderMessages(data || []);
  }

  function renderMessages(msgs) {
    const area = document.getElementById('messagesArea');
    area.innerHTML = '';

    let lastDate = '';
    msgs.forEach(msg => {
      const date = new Date(msg.created_at);
      const dateStr = formatDate(date);
      if (dateStr !== lastDate) {
        area.appendChild(createDivider(dateStr));
        lastDate = dateStr;
      }

      const isSelf = msg.sender_id === currentUser.id;
      const row = document.createElement('div');
      row.className = `message-row ${isSelf ? 'self' : 'other'}`;
      row.innerHTML = `
        <div class="bubble">${escapeHtml(msg.content)}</div>
        <div class="message-time">${formatTime(date)}</div>`;
      area.appendChild(row);
    });

    area.scrollTop = area.scrollHeight;
  }

  function createDivider(text) {
    const d = document.createElement('div');
    d.className = 'time-divider';
    d.textContent = text;
    return d;
  }

  function formatTime(d) {
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function formatDate(d) {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const that = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diff = (today - that) / 86400000;
    if (diff === 0) return '今天';
    if (diff === 1) return '昨天';
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function sendMessage() {
    if (!currentChat) return;
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    const { error } = await supabase.from('messages').insert({
      sender_id: currentUser.id,
      receiver_id: currentChat.id,
      content: text
    });

    if (error) { console.error(error); return; }

    input.value = '';
    input.style.height = '20px';
    document.getElementById('chatSendBtn').disabled = true;
  }

  function subscribeMessages() {
    if (messageSubscription) supabase.removeChannel(messageSubscription);

    const channel = supabase
      .channel(`chat-${[currentUser.id, currentChat.id].sort().join('-')}`)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'messages',
        filter: `sender_id=in.(${currentUser.id},${currentChat.id})`
      }, async () => {
        await loadMessages();
      })
      .subscribe();

    messageSubscription = channel;
  }

  // ==================== REALTIME ====================
  async function setupRealtime() {
    // Listen for new friend messages globally
    if (presenceSubscription) supabase.removeChannel(presenceSubscription);

    // We'll subscribe to new messages from any friend for badge updates
    const { data: friendIds } = await supabase
      .from('friendships')
      .select('friend_id, user_id')
      .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`);

    if (!friendIds) return;
    const ids = friendIds.map(f => f.user_id === currentUser.id ? f.friend_id : f.user_id);

    if (ids.length === 0) return;

    // Monitor incoming messages while in contacts view
    supabase
      .channel('global-messages')
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'messages',
        filter: `receiver_id=eq.${currentUser.id}`
      }, (payload) => {
        // Only if not in chat with this person
        if (currentChat && currentChat.id === payload.new.sender_id) return;
        // Could add badge to contact list here
      })
      .subscribe();
  }

  // ==================== EVENT HANDLERS ====================
  document.getElementById('btnBack').addEventListener('click', () => {
    currentChat = null;
    if (messageSubscription) { supabase.removeChannel(messageSubscription); messageSubscription = null; }
    showContacts();
  });

  document.getElementById('btnLogout').addEventListener('click', async () => {
    if (messageSubscription) supabase.removeChannel(messageSubscription);
    await supabase.auth.signOut();
    currentUser = null;
    profile = null;
    friends = [];
    currentChat = null;
    showAuth();
  });

  const chatInput = document.getElementById('chatInput');
  const chatSendBtn = document.getElementById('chatSendBtn');

  chatInput.addEventListener('input', () => {
    chatInput.style.height = '20px';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
    chatSendBtn.disabled = chatInput.value.trim().length === 0;
  });

  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  chatSendBtn.addEventListener('click', sendMessage);

  // ==================== STARTUP ====================
  initApp();
})();
</script>
</body>
</html>
