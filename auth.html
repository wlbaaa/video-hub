<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>开放创作者平台</title>
<style>
:root{--bg:#0a0a1a;--card:#12122a;--text:#e0e0f0;--muted:#7777aa;--accent:#667eea;--err:#f44;--success:#4caf50}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.page{width:100%;max-width:380px}
.card{background:var(--card);border-radius:20px;padding:2rem 1.5rem;border:1px solid #1a1a3a;text-align:center}
.logo{margin-bottom:2rem}
.logo h1{font-size:1.5rem;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800}
.logo p{color:var(--muted);font-size:0.82rem;margin-top:0.3rem}
.form-group{margin-bottom:1rem;text-align:left}
.form-group input{width:100%;padding:0.75rem 1rem;border-radius:10px;border:1px solid #2a2a4a;background:#0f0f1a;color:var(--text);font-size:0.95rem;outline:none;transition:border-color 0.2s}
.form-group input:focus{border-color:var(--accent)}
.form-group input::placeholder{color:#444}
.error{color:var(--err);font-size:0.82rem;margin-bottom:0.8rem;min-height:1.2rem;text-align:left}
.btn{padding:0.8rem;border-radius:10px;border:none;cursor:pointer;font-size:1rem;font-weight:700;transition:0.2s;width:100%}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid #2a2a4a;margin-top:0.6rem;font-size:0.88rem;font-weight:500}
.footer{text-align:center;margin-top:1.5rem;color:var(--muted);font-size:0.78rem}
.footer a{color:var(--accent);text-decoration:none}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:0.5rem 1.2rem;border-radius:20px;font-size:0.85rem;z-index:9999;opacity:0;pointer-events:none;transition:opacity 0.3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="page">
<div class="card">
    <div class="logo">
        <h1>开放创作者平台</h1>
        <p>输入用户名和密码，首次自动注册</p>
    </div>
    <form onsubmit="handleSubmit(event)">
        <div class="form-group">
            <input type="text" id="username" placeholder="用户名（至少2个字符）" autocomplete="username" required>
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="密码（至少6位）" autocomplete="current-password" required>
        </div>
        <div class="error" id="errorMsg"></div>
        <button class="btn btn-primary" id="submitBtn" type="submit">进入</button>
    </form>
    <button class="btn btn-ghost" onclick="window.location.href='view.html'">游客模式 · 仅浏览</button>
</div>
<div class="footer">
    <a href="view.html">返回首页</a>
</div>
</div>
<div class="toast" id="toast"></div>

<script src="auth.js"></script>
<script>
async function handleSubmit(e){
    e.preventDefault();
    var un=document.getElementById('username').value.trim();
    var pw=document.getElementById('password').value;
    var errEl=document.getElementById('errorMsg');
    var btn=document.getElementById('submitBtn');

    errEl.textContent='';
    btn.disabled=true;btn.textContent='验证中...';

    try{
        var result=await VHAuth.enter({username:un,password:pw,nickname:un});

        if(!result.ok){
            errEl.textContent=result.error;
            btn.disabled=false;btn.textContent='进入';
            return;
        }

        var msg=result.isNew?'欢迎加入！':'欢迎回来！';
        showToast(msg);
        var redirect=(result.role==='sub_admin'||result.role==='admin')?'upload.html':'view.html';
        setTimeout(function(){window.location.href=redirect},600);

    }catch(err){
        errEl.textContent='网络错误：'+err.message;
        btn.disabled=false;btn.textContent='进入';
    }
}

function showToast(m){
    var t=document.getElementById('toast');
    t.textContent=m;t.className='toast show';
    setTimeout(function(){t.classList.remove('show')},2500);
}

// 已登录直接跳转
if(VHAuth.isLoggedIn()){
    var s=VHAuth.currentUser();
    var to=(s.role==='sub_admin'||s.role==='admin')?'upload.html':'view.html';
    window.location.href=to;
}
</script>
</body>
</html>
