<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Hub - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f1a; color: #e0e0e0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .container { width: 100%; max-width: 400px; padding: 2rem; }
        .logo {
            font-size: 2.5rem; margin-bottom: 0.3rem; text-align: center; font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .subtitle { color: #8888aa; margin-bottom: 2rem; font-size: 0.95rem; text-align: center; }
        .tabs {
            display: flex; gap: 0; margin-bottom: 1.5rem;
            background: #1a1a2e; border-radius: 12px; padding: 0.3rem;
        }
        .tab {
            flex: 1; padding: 0.7rem; text-align: center; cursor: pointer;
            border-radius: 10px; font-size: 0.9rem; transition: all 0.3s;
            color: #8888aa; border: none; background: transparent;
        }
        .tab.active { background: rgba(102,126,234,0.2); color: #667eea; }
        .panel { display: none; }
        .panel.active { display: block; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; color: #a0a0c0; font-size: 0.85rem; }
        .form-group input, .form-group textarea {
            width: 100%; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px;
            padding: 0.8rem 1rem; color: #e0e0e0; font-size: 0.95rem; outline: none;
            transition: border-color 0.3s;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus { border-color: #667eea; }

        .btn {
            width: 100%; padding: 0.85rem; border: none; border-radius: 10px;
            font-size: 1rem; cursor: pointer; transition: all 0.3s; font-weight: 500; margin-top: 0.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .status-msg {
            text-align: center; padding: 1rem; border-radius: 10px; margin-top: 1rem;
            font-size: 0.9rem; display: none;
        }
        .status-msg.success { display: block; background: rgba(46,204,113,0.1); color: #2ecc71; border: 1px solid rgba(46,204,113,0.2); }
        .status-msg.error { display: block; background: rgba(231,76,60,0.1); color: #e74c3c; border: 1px solid rgba(231,76,60,0.2); }
        .status-msg.info { display: block; background: rgba(52,152,219,0.1); color: #3498db; border: 1px solid rgba(52,152,219,0.2); }

        .note-text { color: #555577; font-size: 0.75rem; margin-top: 0.3rem; }

        @media (max-width: 500px) {
            .container { padding: 1.5rem 1rem; }
            .logo { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Video Hub</div>
        <div class="subtitle">视频分享与管理平台</div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">登录</button>
            <button class="tab" onclick="switchTab('register')">注册</button>
        </div>

        <!-- Login Panel -->
        <div class="panel active" id="panel-login">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUser" placeholder="请输入用户名" onkeydown="if(event.key==='Enter')handleLogin()">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPass" placeholder="请输入密码" onkeydown="if(event.key==='Enter')handleLogin()">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">登录</button>
            <div class="status-msg" id="loginStatus"></div>
        </div>

        <!-- Register Panel -->
        <div class="panel" id="panel-register">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUser" placeholder="设置用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPass" placeholder="设置密码（6位以上）">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="regPass2" placeholder="再次输入密码">
            </div>
            <div class="form-group">
                <label>备注（选填）</label>
                <textarea id="regNote" placeholder="可以写点自我介绍，或为什么想加入..."></textarea>
                <p class="note-text">提交后需等待管理员审核通过才能登录</p>
            </div>
            <button class="btn btn-primary" onclick="handleRegister()">提交注册申请</button>
            <div class="status-msg" id="regStatus"></div>
        </div>
    </div>

    <script>
        const _p1='Z2hw',_p2='XzdSNm0xamdINTdK',_p3='ZFlsUmpyQllDM2k5',_p4='aVRvYTFNNDByNFNlRg==';
        const _tk=atob(_p1+_p2+_p3+_p4);
        const config={user:'wlbaaa',repo:'video-hub',token:_tk};

        // Auto-redirect if already logged in
        (function(){
            const saved=localStorage.getItem('vh_subadmin');
            if(saved){
                try{
                    const d=JSON.parse(saved);
                    if(d.username){document.getElementById('loginUser').value=d.username;
                    document.getElementById('loginPass').value=d.password||'';}
                }catch(e){}
            }
        })();

        function switchTab(t){
            document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
            document.querySelector('.tab[onclick*="'+t+'"]').classList.add('active');
            document.getElementById('panel-'+t).classList.add('active');
            document.getElementById('loginStatus').className='status-msg';
            document.getElementById('regStatus').className='status-msg';
        }

        async function sha256(msg){
            const buf=new TextEncoder().encode(msg);
            const hash=await crypto.subtle.digest('SHA-256',buf);
            return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
        }

        async function githubAPI(endpoint,options={}){
            const url='https://api.github.com'+endpoint;
            const response=await fetch(url,{...options,headers:{
                'Authorization':'token '+config.token,
                'Accept':'application/vnd.github.v3+json',
                'Content-Type':'application/json',
                ...(options.headers||{})
            }});
            if(!response.ok){const ed=await response.json().catch(()=>({}));throw new Error(ed.message||'HTTP '+response.status);}
            return response.json();
        }
        function decodeBase64(s){return decodeURIComponent(escape(atob(s.replace(/\n/g,''))));}

        async function handleLogin(){
            const s=document.getElementById('loginStatus');
            s.className='status-msg';
            const username=document.getElementById('loginUser').value.trim();
            const password=document.getElementById('loginPass').value.trim();
            if(!username||!password){s.className='status-msg error';s.textContent='请填写用户名和密码';return;}

            try{
                // Check admins.json (approved)
                const d=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json');
                const admins=JSON.parse(decodeBase64(d.content)).sub_admins||[];
                const hash=await sha256(password);
                const found=admins.find(a=>a.username===username&&a.password_hash===hash);
                if(found){
                    localStorage.setItem('vh_subadmin',JSON.stringify({username:username,password:password}));
                    window.location.href='view.html';
                    return;
                }
                // Check registrations.json (pending)
                try{
                    const r=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/registrations.json');
                    const regs=JSON.parse(decodeBase64(r.content)).registrations||[];
                    const pending=regs.find(r=>r.username===username);
                    if(pending){
                        s.className='status-msg info';
                        s.textContent='您的注册申请正在等待管理员审核，请耐心等待~';
                        return;
                    }
                }catch(e){}
                s.className='status-msg error';
                s.textContent='用户名或密码错误，或尚未注册';
            }catch(e){
                s.className='status-msg error';s.textContent='登录失败: 无法连接服务器';
            }
        }

        async function handleRegister(){
            const s=document.getElementById('regStatus');
            s.className='status-msg';
            const username=document.getElementById('regUser').value.trim();
            const pass=document.getElementById('regPass').value.trim();
            const pass2=document.getElementById('regPass2').value.trim();
            const note=document.getElementById('regNote').value.trim();

            if(!username){s.className='status-msg error';s.textContent='请输入用户名';return;}
            if(username.length<2){s.className='status-msg error';s.textContent='用户名至少2个字符';return;}
            if(!pass||pass.length<6){s.className='status-msg error';s.textContent='密码至少6位';return;}
            if(pass!==pass2){s.className='status-msg error';s.textContent='两次密码不一致';return;}

            try{
                // Check if already exists in admins
                try{
                    const d=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json');
                    const admins=JSON.parse(decodeBase64(d.content)).sub_admins||[];
                    if(admins.find(a=>a.username===username)){
                        s.className='status-msg error';s.textContent='该用户名已被使用';return;
                    }
                }catch(e){}

                // Check registrations
                let regs={registrations:[]};
                let sha=null;
                try{
                    const r=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/registrations.json');
                    regs=JSON.parse(decodeBase64(r.content));
                    sha=r.sha;
                }catch(e){}

                // Check duplicate pending
                if((regs.registrations||[]).find(r=>r.username===username)){
                    s.className='status-msg info';s.textContent='您已提交过注册申请，请等待管理员审核';return;
                }

                const hash=await sha256(pass);
                regs.registrations.push({
                    username:username,
                    password_hash:hash,
                    note:note||'',
                    submitted_at:new Date().toISOString()
                });

                const json=btoa(unescape(encodeURIComponent(JSON.stringify(regs,null,2))));
                const body={message:'Registration from '+username,content:json};
                if(sha)body.sha=sha;
                await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/registrations.json',{method:'PUT',body:JSON.stringify(body)});

                s.className='status-msg success';
                s.textContent='注册申请已提交！请等待管理员审核通过后登录。';
                document.getElementById('regUser').value='';
                document.getElementById('regPass').value='';
                document.getElementById('regPass2').value='';
                document.getElementById('regNote').value='';
            }catch(e){
                s.className='status-msg error';s.textContent='提交失败: '+e.message;
            }
        }
    </script>
</body>
</html>
