<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Hub - 主页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f1a; color: #e0e0e0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .container { text-align: center; padding: 2rem; max-width: 600px; width: 100%; }
        .logo {
            font-size: 3rem; margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            font-weight: 700;
        }
        .subtitle { color: #8888aa; margin-bottom: 3rem; font-size: 1.1rem; }
        .cards { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
        .card {
            background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px;
            padding: 2rem 1.5rem; width: 220px; text-align: center; cursor: pointer;
            transition: all 0.3s; text-decoration: none; color: #e0e0e0;
        }
        .card:hover {
            transform: translateY(-6px); border-color: #667eea;
            box-shadow: 0 12px 40px rgba(102,126,234,0.2);
        }
        .card .icon { font-size: 3rem; margin-bottom: 1rem; }
        .card h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .card p { color: #8888aa; font-size: 0.85rem; line-height: 1.5; }

        @media (max-width: 500px) {
            .cards { flex-direction: column; align-items: center; }
            .card { width: 100%; max-width: 280px; }
            .logo { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Video Hub</div>
        <div class="subtitle">视频分享与管理平台</div>
        <div class="cards">
            <a href="upload.html" class="card">
                <div class="icon">📤</div>
                <h3>上传管理</h3>
                <p>上传视频、管理副管理员、查看消息</p>
            </a>
            <a href="view.html" class="card">
                <div class="icon">🎬</div>
                <h3>观看视频</h3>
                <p>浏览和播放视频、与管理员私信交流</p>
            </a>
        </div>
    </div>
</body>
</html>
