<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频观看</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f1a; color: #e0e0e0; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1.2rem 2rem; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #2a2a4a; flex-wrap: wrap; gap: 1rem;
        }
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .user-badge {
            background: rgba(102,126,234,0.15); color: #8899dd; padding: 0.4rem 0.9rem;
            border-radius: 20px; font-size: 0.85rem;
        }
        .logout-btn {
            background: #2a2a4a; color: #a0a0c0; border: none; padding: 0.4rem 0.9rem;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-links a {
            color: #a0a0c0; text-decoration: none; padding: 0.5rem 1rem;
            border-radius: 8px; transition: all 0.3s;
        }
        .nav-links a:hover { color: #fff; background: rgba(102,126,234,0.15); }
        .nav-links a.active { color: #667eea; background: rgba(102,126,234,0.15); }
        .msg-btn {
            background: rgba(102,126,234,0.15); color: #8899dd; border: none; padding: 0.5rem 1rem;
            border-radius: 8px; cursor: pointer; font-size: 0.9rem; position: relative;
        }
        .msg-btn .dot {
            position: absolute; top: 4px; right: 4px; width: 8px; height: 8px;
            background: #e74c3c; border-radius: 50%; display: none;
        }
        .msg-btn .dot.show { display: block; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }

        .key-modal-overlay {
            display: flex; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); z-index: 2000; align-items: center;
            justify-content: center; padding: 1rem;
        }
        
        .remember-me { display: flex; align-items: center; gap: 0.5rem; margin: 0.7rem 0; justify-content: center; }
        .remember-me input[type="checkbox"] {
            width: 16px; height: 16px; accent-color: #667eea; cursor: pointer;
        }
        .remember-me label { color: #8888aa; font-size: 0.85rem; cursor: pointer; }
        .key-modal-overlay.hidden { display: none !important; }
        .key-modal {
            background: #1a1a2e; border-radius: 16px; padding: 2rem;
            border: 1px solid #2a2a4a; text-align: center; max-width: 360px; width: 100%;
        }
        .key-modal h3 { margin-bottom: 0.3rem; color: #e0e0e0; font-size: 1.1rem; }
        .key-modal .subtitle { color: #8888aa; font-size: 0.85rem; margin-bottom: 1.2rem; }
        .key-modal .auto-hint { color: #555577; font-size: 0.75rem; margin-bottom: 1rem; display: none; }
        .key-modal input {
            width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px;
            padding: 0.85rem 1rem; color: #e0e0e0; font-size: 0.95rem; text-align: center;
            outline: none; transition: border-color 0.3s; margin-bottom: 0.7rem;
        }
        .key-modal input:focus { border-color: #667eea; }
        .container:not(.content-unlocked) .content-locked { display: none !important; }

        .btn {
            padding: 0.7rem 1.5rem; border: none; border-radius: 8px;
            font-size: 0.95rem; cursor: pointer; transition: all 0.3s; font-weight: 500;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .btn-ghost { background: none; color: #8888aa; border: 1px solid #2a2a4a; }

        .search-bar { margin-bottom: 1.5rem; }
        .search-bar input {
            width: 100%; background: #1a1a2e; border: 1px solid #2a2a4a;
            border-radius: 12px; padding: 0.9rem 1.2rem; color: #e0e0e0;
            font-size: 1rem; outline: none; transition: border-color 0.3s;
        }
        .search-bar input:focus { border-color: #667eea; }
        .search-bar input::placeholder { color: #444466; }

        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem;
        }
        .video-card {
            background: #1a1a2e; border-radius: 16px; overflow: hidden;
            border: 1px solid #2a2a4a; transition: all 0.3s; cursor: pointer;
        }
        .video-card:hover {
            transform: translateY(-4px); border-color: #667eea;
            box-shadow: 0 8px 30px rgba(102,126,234,0.15);
        }
        .video-thumbnail {
            width: 100%; aspect-ratio: 16/9; background: #0f0f1a;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .video-thumbnail video { width: 100%; height: 100%; object-fit: cover; }
        .uploader-tag {
            position: absolute; top: 8px; left: 8px; padding: 0.2rem 0.6rem;
            border-radius: 8px; font-size: 0.75rem;
            background: rgba(0,0,0,0.7); color: #8899dd; z-index: 5;
        }
        .play-icon {
            position: absolute; width: 56px; height: 56px;
            background: rgba(102,126,234,0.9); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; transition: all 0.3s; pointer-events: none;
        }
        .video-card:hover .play-icon { transform: scale(1.1); background: rgba(102,126,234,1); }
        .video-info { padding: 1rem 1.2rem; }
        .video-title {
            font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .video-desc {
            color: #8888aa; font-size: 0.85rem; margin-bottom: 0.5rem;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .video-meta {
            color: #555577; font-size: 0.8rem; display: flex; justify-content: space-between;
        }

        /* Chat Panel */
        .chat-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 1500; justify-content: center;
            align-items: center; padding: 1rem;
        }
        .chat-overlay.visible { display: flex; }
        .chat-panel {
            background: #1a1a2e; border-radius: 16px; border: 1px solid #2a2a4a;
            width: 100%; max-width: 450px; max-height: 80vh; display: flex; flex-direction: column;
        }
        .chat-header {
            padding: 1rem 1.2rem; border-bottom: 1px solid #2a2a4a;
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-header h3 { font-size: 1rem; color: #e0e0e0; }
        .chat-body {
            flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem;
            min-height: 300px; max-height: 50vh;
        }
        .chat-msg {
            max-width: 80%; padding: 0.6rem 0.9rem; border-radius: 12px; font-size: 0.9rem;
            line-height: 1.4; word-break: break-word;
        }
        .chat-msg.me {
            align-self: flex-end; background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; border-bottom-right-radius: 4px;
        }
        .chat-msg.other {
            align-self: flex-start; background: #252540; color: #ccc;
            border-bottom-left-radius: 4px;
        }
        .chat-msg .msg-sender { font-size: 0.72rem; color: #8899dd; margin-bottom: 0.2rem; }
        .chat-msg .msg-time { font-size: 0.68rem; color: #666; margin-top: 0.2rem; text-align: right; }
        .chat-input-area {
            padding: 0.8rem 1rem; border-top: 1px solid #2a2a4a; display: flex; gap: 0.5rem;
        }
        .chat-input-area input {
            flex: 1; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px;
            padding: 0.6rem 0.8rem; color: #e0e0e0; font-size: 0.9rem; outline: none;
        }
        .chat-input-area input:focus { border-color: #667eea; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; align-items: center;
            justify-content: center; padding: 2rem;
        }
        .modal-overlay.visible { display: flex; }
        .modal-content {
            width: 100%; max-width: 900px; background: #1a1a2e;
            border-radius: 16px; overflow: hidden; border: 1px solid #2a2a4a;
            max-height: 90vh; overflow-y: auto;
        }
        .modal-video { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .modal-video video { width: 100%; height: 100%; }
        .modal-uploader {
            position: absolute; top: 12px; left: 12px; display: flex; align-items: center; gap: 0.5rem;
            background: rgba(0,0,0,0.75); border-radius: 24px; padding: 0.35rem 0.8rem 0.35rem 0.4rem;
            z-index: 10; backdrop-filter: blur(6px);
        }
        .modal-uploader .mu-avatar {
            width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0;
        }
        .modal-uploader .mu-name { font-size: 0.85rem; color: #ddd; }
        .modal-info { padding: 1.5rem; }
        .modal-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem; }
        .modal-desc { color: #8888aa; margin-bottom: 0.75rem; line-height: 1.5; }
        .modal-meta { color: #555577; font-size: 0.85rem; }
        .modal-close {
            position: fixed; top: 1.5rem; right: 1.5rem; width: 40px; height: 40px;
            background: rgba(255,255,255,0.1); border: none; border-radius: 50%;
            color: white; font-size: 1.2rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.3s; z-index: 1001;
        }
        .modal-close:hover { background: rgba(255,255,255,0.2); }

        /* Comments */
        .comment-section { padding: 0 1.5rem 1.5rem; border-top: 1px solid #2a2a4a; }
        .comment-section h4 { margin: 1rem 0 0.8rem; font-size: 1rem; color: #a0a0c0; }
        .comment-list { max-height: 250px; overflow-y: auto; margin-bottom: 0.8rem; }
        .comment-item { padding: 0.6rem 0; border-bottom: 1px solid #1e1e36; }
        .comment-item:last-child { border-bottom: none; }
        .comment-user { font-size: 0.85rem; color: #8899dd; margin-bottom: 0.2rem; }
        .comment-content { font-size: 0.9rem; color: #ccc; line-height: 1.4; }
        .comment-time { font-size: 0.72rem; color: #555577; margin-top: 0.15rem; }
        .comment-input-area { display: flex; gap: 0.5rem; }
        .comment-input-area input {
            flex: 1; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px;
            padding: 0.5rem 0.8rem; color: #e0e0e0; font-size: 0.85rem; outline: none;
        }
        .comment-input-area input:focus { border-color: #667eea; }
        .comment-empty { text-align: center; color: #555577; padding: 1rem; font-size: 0.85rem; }
        .comment-login-hint { text-align: center; color: #555577; padding: 0.5rem; font-size: 0.8rem; }

        /* Upload Panel */
        .upload-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); z-index: 2000; align-items: center;
            justify-content: center; padding: 1rem;
        }
        .upload-overlay.visible { display: flex; }
        .upload-panel {
            background: #1a1a2e; border-radius: 16px; border: 1px solid #2a2a4a;
            width: 100%; max-width: 420px; padding: 1.5rem;
        }
        .upload-panel h3 { margin-bottom: 1rem; font-size: 1.1rem; }
        .upload-panel .up-area {
            border: 2px dashed #2a2a4a; border-radius: 12px; padding: 1.5rem;
            text-align: center; cursor: pointer; margin-bottom: 1rem; transition: border-color 0.3s;
        }
        .upload-panel .up-area:hover { border-color: #667eea; }
        .upload-panel .up-area .up-icon { font-size: 2rem; margin-bottom: 0.3rem; }
        .upload-panel .up-area p { color: #8888aa; font-size: 0.85rem; }
        .up-bar { height: 6px; background: #2a2a4a; border-radius: 3px; overflow: hidden; margin: 0.5rem 0; display: none; }
        .up-bar .up-fill { height: 100%; background: linear-gradient(90deg,#667eea,#764ba2); width: 0; transition: width 0.3s; }
        .up-status { color: #555577; font-size: 0.8rem; display: none; }

        .empty-state { text-align: center; padding: 4rem 2rem; color: #555577; }
        .empty-state .empty-icon { font-size: 4rem; margin-bottom: 1rem; }
        .empty-state h3 { margin-bottom: 0.5rem; color: #8888aa; }
        .loading { text-align: center; padding: 2rem; color: #8888aa; }
        .loading-spinner {
            display: inline-block; width: 30px; height: 30px; border: 3px solid #2a2a4a;
            border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-bottom: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem;
            border-radius: 12px; background: #1a1a2e; border: 1px solid #2a2a4a;
            color: #e0e0e0; font-size: 0.9rem; transform: translateY(100px);
            opacity: 0; transition: all 0.3s; z-index: 2000; max-width: 400px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: #e74c3c; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
            background: #1a1a2e; border-top: 1px solid #2a2a4a;
            display: flex; z-index: 900; padding-bottom: env(safe-area-inset-bottom,0);
        }
        .bottom-nav a {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: #555577; text-decoration: none;
            font-size: 0.7rem; gap: 2px; transition: color 0.2s;
        }
        .bottom-nav a .bn-icon { font-size: 1.25rem; }
        .bottom-nav a.active { color: #667eea; }

        @media (max-width: 600px) {
            .video-grid { grid-template-columns: 1fr; }
            .header { padding: 1rem; }
            .container { padding: 0 1rem; padding-bottom: 72px; }
            .modal-overlay { padding: 0; }
            .modal-content { border-radius: 0; min-height: 100vh; max-height: 100vh; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>视频观看端</h1>
        <div class="header-right" id="headerRight" style="display:none;">
            <span class="user-badge" id="userBadge"></span>
            <button class="msg-btn" id="msgBtn" onclick="toggleChat()">消息<span class="dot" id="msgDot"></span></button>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
        <div class="nav-links">
            <a href="index.html">主页</a>
            <a href="view.html" class="active">观看</a>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <div class="search-bar content-locked">
            <input type="text" id="searchInput" placeholder="搜索视频..." oninput="filterVideos()">
        </div>
        <div id="videoGrid" class="video-grid content-locked">
            <div class="empty-state">
                <div class="empty-icon">📺</div>
                <h3>暂无视频</h3>
                <p>连接 GitHub 仓库后，上传的视频将显示在这里</p>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="key-modal-overlay" id="keyModal">
        <div class="key-modal">
            <h3>副管理员登录</h3>
            <p class="subtitle">请输入您的账号和密码</p>
            <p class="auto-hint" id="autoHint">检测到上次登录，正在自动登录...</p>
            <input type="text" id="loginUser" placeholder="账号名称">
            <input type="password" id="loginPass" placeholder="登录密码" onkeydown="if(event.key==='Enter')checkLogin()">
            <div class="remember-me">
                <input type="checkbox" id="rememberMe" checked>
                <label for="rememberMe">保持登录状态</label>
            </div>
            <button class="btn btn-primary" onclick="checkLogin()">登录</button>
        </div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-overlay" id="chatOverlay">
        <div class="chat-panel">
            <div class="chat-header">
                <h3>消息中心</h3>
                <button class="btn btn-ghost btn-sm" onclick="toggleChat()">关闭</button>
            </div>
            <div class="chat-body" id="chatBody">
                <div style="text-align:center;color:#555577;padding:2rem;">正在加载消息...</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMessage()">
                <button class="btn btn-primary btn-sm" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <!-- Video Modal -->
    <div class="modal-overlay" id="videoModal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-content">
            <div class="modal-video">
                <video id="modalPlayer" controls></video>
                <div class="modal-uploader" id="modalUploader" style="display:none;">
                    <div class="mu-avatar" id="muAvatar"></div>
                    <span class="mu-name" id="muName"></span>
                </div>
            </div>
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-desc" id="modalDesc"></div>
                <div class="modal-meta" id="modalMeta"></div>
            </div>
            <div class="comment-section" id="commentSection">
                <h4>评论区</h4>
                <div class="comment-list" id="commentList">
                    <div class="comment-empty">加载中...</div>
                </div>
                <div id="commentUiArea">
                    <div class="comment-input-area" id="commentInputArea" style="display:none;">
                        <input type="text" id="commentInput" placeholder="写下你的评论..." onkeydown="if(event.key==='Enter')postComment()">
                        <button class="btn btn-primary btn-sm" onclick="postComment()">发表</button>
                    </div>
                    <div class="comment-login-hint" id="commentLoginHint">请先登录再发表评论</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Upload Panel -->
    <div class="upload-overlay" id="uploadOverlay">
        <div class="upload-panel">
            <h3>创建作品</h3>
            <div class="up-area" id="upDropArea">
                <div class="up-icon">📹</div>
                <p>点击或拖拽视频到此上传</p>
                <input type="file" id="upFileInput" accept="video/*" style="display:none">
            </div>
            <div class="form-group" style="margin-bottom:0.5rem">
                <label>标题</label><input type="text" id="upTitle" placeholder="输入视频标题">
            </div>
            <div class="form-group" style="margin-bottom:0.5rem">
                <label>描述</label><textarea id="upDesc" placeholder="输入视频描述（可选）" style="resize:vertical;min-height:50px"></textarea>
            </div>
            <div class="up-bar" id="upBar"><div class="up-fill" id="upFill"></div></div>
            <div class="up-status" id="upStatus"></div>
            <div style="display:flex;gap:0.5rem;margin-top:0.8rem">
                <button class="btn btn-ghost btn-sm" onclick="closeUploadPanel()">取消</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const _p1='Z2hw',_p2='XzdSNm0xamdINTdK',_p3='ZFlsUmpyQllDM2k5',_p4='aVRvYTFNNDByNFNlRg==';
        const _tk=atob(_p1+_p2+_p3+_p4);
        let config={user:'wlbaaa',repo:'video-hub',token:_tk};
        let allVideos=[];
        let currentUser=null;
        let currentVideoId=null;
        let messages=[];
        let chatPollTimer=null;

        async function sha256(msg){
            const buf=new TextEncoder().encode(msg);
            const hash=await crypto.subtle.digest('SHA-256',buf);
            return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
        }

        // Auto login
        function checkAutoLogin(){
            const saved=localStorage.getItem('vh_subadmin');
            if(saved){
                try{
                    const data=JSON.parse(saved);
                    document.getElementById('loginUser').value=data.username||'';
                    document.getElementById('loginPass').value=data.password||'';
                    document.getElementById('autoHint').style.display='block';
                    setTimeout(function(){checkLogin();},800);
                }catch(e){}
            }
        }

        async function checkLogin(){
            const username=document.getElementById('loginUser').value.trim();
            const password=document.getElementById('loginPass').value.trim();
            if(!username||!password){showToast('请填写账号和密码','error');return;}

            try{
                const data=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json');
                const adminsData=JSON.parse(decodeBase64(data.content));
                const subAdmins=adminsData.sub_admins||[];
                const hash=await sha256(password);
                const admin=subAdmins.find(function(a){return a.username===username&&a.password_hash===hash;});

                if(admin){
                    currentUser=admin.username;
                    localStorage.setItem('vh_subadmin',JSON.stringify({username:username,password:password}));
                    unlock();
                }else{
                    localStorage.removeItem('vh_subadmin');
                    showToast('账号或密码错误','error');
                }
            }catch(e){
                showToast('登录失败: 无法连接服务器','error');
            }
        }

        function unlock(){
            document.getElementById('keyModal').classList.add('hidden');
            document.getElementById('mainContainer').classList.add('content-unlocked');
            document.getElementById('headerRight').style.display='flex';
            document.getElementById('userBadge').textContent='👤 '+currentUser;
            validateToken();
        }

        function logout(){
            currentUser=null;
            allVideos=[];
            localStorage.removeItem('vh_subadmin');
            if(chatPollTimer){clearInterval(chatPollTimer);chatPollTimer=null;}
            document.getElementById('mainContainer').classList.remove('content-unlocked');
            document.getElementById('keyModal').classList.remove('hidden');
            document.getElementById('headerRight').style.display='none';
            document.getElementById('loginUser').value='';
            document.getElementById('loginPass').value='';
            document.getElementById('videoGrid').innerHTML='<div class="empty-state"><div class="empty-icon">📺</div><h3>暂无视频</h3><p>请登录后查看</p></div>';
        }

        document.getElementById('videoModal').addEventListener('click',function(e){if(e.target===e.currentTarget)closeModal();});
        document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();if(document.getElementById('chatOverlay').classList.contains('visible'))toggleChat();}});

        async function validateToken(){
            try{
                await githubAPI('/repos/'+config.user+'/'+config.repo);
                showToast('欢迎, '+currentUser,'success');
                loadVideos();
                startChatPoll();
            }catch(error){
                showToast('连接失败: '+error.message,'error');
            }
        }

        async function loadVideos(){
            const grid=document.getElementById('videoGrid');
            grid.innerHTML='<div class="loading" style="grid-column:1/-1;"><div class="loading-spinner"></div><div>正在加载视频列表...</div></div>';
            try{
                allVideos=await getVideos();
                renderVideos(allVideos);
            }catch(e){
                grid.innerHTML='<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">⚠️</div><h3>加载失败</h3><p>请检查配置</p></div>';
            }
        }

        function renderVideos(videos){
            const grid=document.getElementById('videoGrid');
            if(videos.length===0){
                grid.innerHTML='<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">📺</div><h3>暂无视频</h3><p>去上传页面添加一些视频吧</p></div>';
                return;
            }
            grid.innerHTML=videos.map(function(v){
                var vu='https://raw.githubusercontent.com/'+config.user+'/'+config.repo+'/main/'+v.path;
                return '<div class="video-card" onclick="playVideo(\''+v.id+'\')">'+
                    '<div class="video-thumbnail">'+
                    '<span class="uploader-tag">📹 '+escapeHtml(v.uploaded_by||'管理员')+'</span>'+
                    '<video src="'+vu+'#t=1" muted preload="metadata"></video>'+
                    '<div class="play-icon">▶</div></div>'+
                    '<div class="video-info">'+
                    '<div class="video-title">'+escapeHtml(v.title)+'</div>'+
                    '<div class="video-desc">'+escapeHtml(v.description||'无描述')+'</div>'+
                    '<div class="video-meta">'+
                    '<span>'+formatSize(v.size)+'</span>'+
                    '<span>'+formatDate(v.uploadDate)+'</span></div></div></div>';
            }).join('');
        }

        function filterVideos(){
            const query=document.getElementById('searchInput').value.trim().toLowerCase();
            if(!query){renderVideos(allVideos);return;}
            var f=allVideos.filter(function(v){return v.title.toLowerCase().indexOf(query)!==-1||(v.description&&v.description.toLowerCase().indexOf(query)!==-1);});
            renderVideos(f);
        }

        function avatarColor(name){
            var hash=0,i;
            for(i=0;i<name.length;i++)hash=name.charCodeAt(i)+((hash<<5)-hash);
            var h=Math.abs(hash)%360;
            return 'hsl('+h+',55%,45%)';
        }
        function playVideo(id){
            var v=allVideos.find(function(x){return x.id===id;});
            if(!v)return;
            currentVideoId=id;
            var vu='https://raw.githubusercontent.com/'+config.user+'/'+config.repo+'/main/'+v.path;
            var modal=document.getElementById('videoModal');
            var player=document.getElementById('modalPlayer');
            document.getElementById('modalTitle').textContent=v.title;
            document.getElementById('modalDesc').textContent=v.description||'';
            document.getElementById('modalMeta').textContent=formatSize(v.size)+' · '+
                new Date(v.uploadDate).toLocaleString('zh-CN')+' · 上传者: '+(v.uploaded_by||'管理员');
            var uName=v.uploaded_by||'管理员';
            document.getElementById('muName').textContent=uName;
            var av=document.getElementById('muAvatar');
            av.style.background=avatarColor(uName);
            av.textContent=uName.charAt(0).toUpperCase();
            document.getElementById('modalUploader').style.display='flex';
            player.src=vu;
            modal.classList.add('visible');
            player.play().catch(function(){});
            loadComments(id);
            updateCommentUi();
        }

        function closeModal(){
            var modal=document.getElementById('videoModal');
            var player=document.getElementById('modalPlayer');
            player.pause();player.src='';
            modal.classList.remove('visible');
            currentVideoId=null;
        }

        // Comments
        function updateCommentUi(){
            if(currentUser){
                document.getElementById('commentInputArea').style.display='flex';
                document.getElementById('commentLoginHint').style.display='none';
            }else{
                document.getElementById('commentInputArea').style.display='none';
                document.getElementById('commentLoginHint').style.display='block';
            }
        }

        async function loadComments(videoId){
            var list=document.getElementById('commentList');
            list.innerHTML='<div class="comment-empty">加载中...</div>';
            try{
                var raw=await loadCommentsData();
                var all=raw.comments||[];
                var videoComments=all.filter(function(c){return c.video_id===videoId;});
                renderComments(videoComments);
            }catch(e){
                list.innerHTML='<div class="comment-empty">暂无评论</div>';
            }
        }

        function renderComments(comments){
            var list=document.getElementById('commentList');
            if(comments.length===0){
                list.innerHTML='<div class="comment-empty">暂无评论，来发表第一条吧</div>';
                return;
            }
            comments.sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
            list.innerHTML=comments.map(function(c){
                return '<div class="comment-item">'+
                    '<div class="comment-user">'+escapeHtml(c.username)+'</div>'+
                    '<div class="comment-content">'+escapeHtml(c.content)+'</div>'+
                    '<div class="comment-time">'+formatDate(c.timestamp)+' '+formatTime(c.timestamp)+'</div>'+
                    '</div>';
            }).join('');
            list.scrollTop=list.scrollHeight;
        }

        async function postComment(){
            var input=document.getElementById('commentInput');
            var content=input.value.trim();
            if(!content)return;
            if(!currentUser){showToast('请先登录','error');return;}
            if(!currentVideoId)return;

            input.value='';
            try{
                var data=await loadCommentsData();
                data.comments.push({
                    id:Date.now().toString(),
                    video_id:currentVideoId,
                    username:currentUser,
                    content:content,
                    timestamp:new Date().toISOString()
                });
                await saveCommentsData(data);
                loadComments(currentVideoId);
            }catch(e){
                showToast('评论失败: '+e.message,'error');
            }
        }

        async function loadCommentsData(){
            try{
                var d=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/comments.json');
                return JSON.parse(decodeBase64(d.content));
            }catch(e){return {comments:[]};}
        }

        async function saveCommentsData(data){
            var json=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
            var sha=null;
            try{var e=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/comments.json');sha=e.sha;}catch(e){}
            var body={message:'New comment',content:json};
            if(sha)body.sha=sha;
            await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/comments.json',{method:'PUT',body:JSON.stringify(body)});
        }

        // Chat
        function toggleChat(){
            const overlay=document.getElementById('chatOverlay');
            if(overlay.classList.contains('visible')){
                overlay.classList.remove('visible');
                document.getElementById('msgDot').classList.remove('show');
            }else{
                overlay.classList.add('visible');
                document.getElementById('msgDot').classList.remove('show');
                loadMessages();
            }
        }

        async function loadMessages(){
            const data=await loadMessagesData();
            const myMsgs=data.messages||[];
            messages=myMsgs.filter(function(m){return m.to===currentUser||m.from===currentUser||m.to==='all';});
            renderMessages();
        }

        async function loadMessagesData(){
            try{
                const d=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/messages.json');
                return JSON.parse(decodeBase64(d.content));
            }catch(e){return {messages:[]};}
        }

        async function saveMessagesData(data){
            const json=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
            let sha=null;
            try{const e=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/messages.json');sha=e.sha;}catch(e){}
            const body={message:'New message',content:json};
            if(sha)body.sha=sha;
            await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/messages.json',{method:'PUT',body:JSON.stringify(body)});
        }

        function renderMessages(){
            const body=document.getElementById('chatBody');
            if(messages.length===0){
                body.innerHTML='<div style="text-align:center;color:#555577;padding:2rem;">暂无消息</div>';
                return;
            }
            body.innerHTML=messages.map(function(m){
                var isMe=m.from===currentUser;
                return '<div class="chat-msg '+(isMe?'me':'other')+'">'+
                    (isMe?'':'<div class="msg-sender">'+escapeHtml(m.from)+'</div>')+
                    '<div>'+escapeHtml(m.content)+'</div>'+
                    '<div class="msg-time">'+formatTime(m.timestamp)+'</div></div>';
            }).join('');
            body.scrollTop=body.scrollHeight;
        }

        async function sendMessage(){
            const input=document.getElementById('chatInput');
            const content=input.value.trim();
            if(!content)return;
            input.value='';

            const data=await loadMessagesData();
            data.messages.push({
                id:Date.now().toString(),
                from:currentUser,
                to:'管理员',
                content:content,
                timestamp:new Date().toISOString()
            });
            await saveMessagesData(data);
            loadMessages();
        }

        let lastMsgCount=0;
        function startChatPoll(){
            if(chatPollTimer)clearInterval(chatPollTimer);
            chatPollTimer=setInterval(async function(){
                try{
                    const data=await loadMessagesData();
                    const myMsgs=(data.messages||[]).filter(function(m){return m.to===currentUser||m.from===currentUser||m.to==='all';});
                    if(myMsgs.length>lastMsgCount){
                        if(!document.getElementById('chatOverlay').classList.contains('visible')){
                            document.getElementById('msgDot').classList.add('show');
                        }
                        messages=myMsgs;
                        if(document.getElementById('chatOverlay').classList.contains('visible')){
                            renderMessages();
                        }
                    }
                    lastMsgCount=myMsgs.length;
                }catch(e){}
            },8000);
        }

        function formatTime(isoStr){
            if(!isoStr)return'';
            const d=new Date(isoStr);
            return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
        }

        // ────── Upload Panel ──────
        function openUploadPanel(){
            if(!currentUser){ showToast('请先登录'); return; }
            document.getElementById('uploadOverlay').classList.add('visible');
            document.getElementById('upFileInput').value='';
            document.getElementById('upTitle').value='';
            document.getElementById('upDesc').value='';
            document.getElementById('upBar').style.display='none';
            document.getElementById('upStatus').style.display='none';
        }
        function closeUploadPanel(){
            document.getElementById('uploadOverlay').classList.remove('visible');
        }
        document.addEventListener('DOMContentLoaded',function(){
            const dropArea=document.getElementById('upDropArea');
            const fileInput=document.getElementById('upFileInput');
            dropArea.addEventListener('click',function(){ fileInput.click(); });
            dropArea.addEventListener('dragover',function(e){ e.preventDefault(); dropArea.style.borderColor='#667eea'; });
            dropArea.addEventListener('dragleave',function(){ dropArea.style.borderColor='#2a2a4a'; });
            dropArea.addEventListener('drop',function(e){ e.preventDefault(); dropArea.style.borderColor='#2a2a4a'; handleUploadFile(e.dataTransfer.files[0]); });
            fileInput.addEventListener('change',function(){ handleUploadFile(fileInput.files[0]); });
            document.getElementById('uploadOverlay').addEventListener('click',function(e){ if(e.target===this) closeUploadPanel(); });
        });
        function handleUploadFile(file){
            if(!file){ return; }
            if(!/^video\//.test(file.type)){ showToast('请选择视频文件'); return; }
            if(file.size>100*1024*1024){ showToast('视频不能超过 100MB'); return; }
            document.getElementById('upStatus').style.display='block';
            document.getElementById('upStatus').textContent='编码中... ('+formatSize(file.size)+')';
            document.getElementById('upBar').style.display='block';
            document.getElementById('upFill').style.width='20%';
            const reader=new FileReader();
            reader.onprogress=function(e){ if(e.lengthComputable){ document.getElementById('upFill').style.width=Math.min(90,20+(e.loaded/e.total)*70)+'%'; } };
            reader.onload=async function(){
                document.getElementById('upFill').style.width='95%';
                document.getElementById('upStatus').textContent='上传中...';
                try{
                    const base64=reader.result.split(',')[1];
                    const timestamp=new Date().toISOString();
                    const videoId='v_'+Date.now();
                    const shaVal=await sha256(file.name+timestamp);
                    const newVideo={
                        id:videoId,
                        title:document.getElementById('upTitle').value.trim()||file.name.replace(/\.[^.]+$/,''),
                        description:document.getElementById('upDesc').value.trim()||'',
                        filename:file.name,
                        size:file.size,
                        uploaded_by:currentUser,
                        sha:shaVal.substring(0,16),
                        created_at:timestamp,
                        path:'videos/'+videoId+'.'+file.name.split('.').pop()
                    };
                    // Upload video file
                    await githubAPI('repos/'+config.user+'/'+config.repo+'/contents/'+newVideo.path,{
                        method:'PUT',
                        body:JSON.stringify({message:'upload: '+newVideo.title,content:base64})
                    });
                    // Update videos.json
                    let vData=await getVideosData();
                    vData.videos=vData.videos||[];
                    vData.videos.unshift(newVideo);
                    await githubAPI('repos/'+config.user+'/'+config.repo+'/contents/videos.json',{
                        method:'PUT',
                        body:JSON.stringify({message:'update videos.json',content:btoa(unescape(encodeURIComponent(JSON.stringify(vData,null,2)))),sha:(await getVideosSha())})
                    });
                    document.getElementById('upFill').style.width='100%';
                    document.getElementById('upStatus').textContent='上传成功!';
                    setTimeout(function(){ closeUploadPanel(); allVideos.unshift(newVideo); renderVideos(); },800);
                }catch(e){
                    document.getElementById('upStatus').textContent='上传失败: '+e.message;
                    document.getElementById('upFill').style.background='#f44';
                }
            };
            reader.readAsDataURL(file);
        }
        async function getVideosSha(){
            try{ const r=await githubAPI('repos/'+config.user+'/'+config.repo+'/contents/videos.json'); return r.sha; }catch(e){ return null; }
        }
        async function getVideosData(){
            try{ const r=await githubAPI('repos/'+config.user+'/'+config.repo+'/contents/videos.json'); return JSON.parse(decodeBase64(r.content)); }catch(e){ return {videos:[]}; }
        }

        async function githubAPI(endpoint,options){
            options=options||{};
            var headers={
                'Authorization':'token '+config.token,
                'Accept':'application/vnd.github.v3+json',
                'Content-Type':'application/json'
            };
            if(options.headers)for(var k in options.headers)headers[k]=options.headers[k];
            var url='https://api.github.com'+endpoint;
            var resp=await fetch(url,{method:options.method||'GET',headers:headers,body:options.body||undefined});
            if(!resp.ok){var ed=await resp.json().catch(function(){return{};});throw new Error(ed.message||'HTTP '+resp.status);}
            return resp.json();
        }

        async function getVideos(){
            try{
                const data=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json');
                return JSON.parse(decodeBase64(data.content));
            }catch(e){return [];}
        }

        function decodeBase64(str){return decodeURIComponent(escape(atob(str.replace(/\n/g,''))));}
        function formatSize(b){if(!b||b===0)return'0 B';const k=1024;const s=['B','KB','MB','GB'];const i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i];}
        function formatDate(isoStr){if(!isoStr)return'';const d=new Date(isoStr);return d.toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'});}
        function escapeHtml(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
        function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'')+' show';setTimeout(function(){t.classList.remove('show');},3000);}

        // Init
        checkAutoLogin();
    </script>
