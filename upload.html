<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频上传 - 管理员</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f1a; color: #e0e0e0; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1.2rem 2rem; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #2a2a4a; flex-wrap: wrap; gap: 1rem;
        }
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .nav-links { display: flex; gap: 1rem; }
        .nav-links a {
            color: #a0a0c0; text-decoration: none; padding: 0.5rem 1rem;
            border-radius: 8px; transition: all 0.3s;
        }
        .nav-links a:hover { color: #fff; background: rgba(102,126,234,0.15); }
        .nav-links a.active { color: #667eea; background: rgba(102,126,234,0.15); }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }

        .key-modal-overlay {
            display: flex; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); z-index: 2000; align-items: center;
            justify-content: center; padding: 1rem;
        }
        .key-modal-overlay.hidden { display: none !important; }
        .key-modal {
            background: #1a1a2e; border-radius: 16px; padding: 2rem;
            border: 1px solid #2a2a4a; text-align: center; max-width: 360px; width: 100%;
        }
        .key-modal h3 { margin-bottom: 0.5rem; color: #e0e0e0; font-size: 1.1rem; }
        .key-modal .subtitle { color: #8888aa; font-size: 0.85rem; margin-bottom: 1.2rem; }
        .key-modal input {
            width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px;
            padding: 0.9rem 1rem; color: #e0e0e0; font-size: 1rem; text-align: center;
            outline: none; transition: border-color 0.3s; margin-bottom: 0.8rem;
        }
        .key-modal input:focus { border-color: #667eea; }
        .container:not(.content-unlocked) .content-locked { display: none !important; }

        /* Tabs */
        .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #2a2a4a; }
        .tab-btn {
            padding: 0.7rem 1.3rem; background: none; border: none; color: #8888aa;
            cursor: pointer; font-size: 0.9rem; border-bottom: 2px solid transparent;
            transition: all 0.3s; font-weight: 500;
        }
        .tab-btn:hover { color: #ccc; }
        .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .input-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .input-group label { font-size: 0.85rem; color: #8888aa; }
        .input-group input {
            background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px;
            padding: 0.7rem 1rem; color: #e0e0e0; font-size: 0.95rem; outline: none;
            transition: border-color 0.3s;
        }
        .input-group input:focus { border-color: #667eea; }
        .input-group input::placeholder { color: #444466; }

        .btn {
            padding: 0.7rem 1.5rem; border: none; border-radius: 8px;
            font-size: 0.95rem; cursor: pointer; transition: all 0.3s; font-weight: 500;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-secondary { background: #2a2a4a; color: #a0a0c0; }
        .btn-secondary:hover { background: #3a3a5a; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; }

        .upload-area {
            background: #1a1a2e; border: 2px dashed #2a2a4a; border-radius: 16px;
            padding: 3rem 2rem; text-align: center; cursor: pointer;
            transition: all 0.3s; margin-bottom: 2rem;
        }
        .upload-area:hover, .upload-area.drag-over {
            border-color: #667eea; background: rgba(102,126,234,0.05);
        }
        .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
        .upload-area h2 { margin-bottom: 0.5rem; color: #e0e0e0; }
        .upload-area p { color: #6666888; font-size: 0.9rem; }

        .upload-form {
            background: #1a1a2e; border-radius: 16px; padding: 1.5rem;
            margin-bottom: 2rem; border: 1px solid #2a2a4a; display: none;
        }
        .upload-form.visible { display: block; }

        .file-info {
            display: flex; align-items: center; gap: 1rem; padding: 1rem;
            background: #0f0f1a; border-radius: 8px; margin-bottom: 1rem;
        }
        .file-icon { font-size: 2rem; }
        .file-details { flex: 1; }
        .file-name { font-weight: 500; margin-bottom: 0.25rem; }
        .file-size { color: #6666888; font-size: 0.85rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; color: #8888aa; font-size: 0.9rem; }
        .form-group input, .form-group textarea {
            width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px;
            padding: 0.7rem 1rem; color: #e0e0e0; font-size: 0.95rem; outline: none;
            transition: border-color 0.3s; font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #667eea; }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .progress-bar {
            width: 100%; height: 6px; background: #0f0f1a; border-radius: 3px;
            overflow: hidden; margin: 1rem 0; display: none;
        }
        .progress-bar.visible { display: block; }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px; transition: width 0.3s; width: 0%;
        }
        .progress-text { text-align: center; color: #8888aa; font-size: 0.85rem; display: none; }
        .progress-text.visible { display: block; }
        .upload-actions { display: flex; gap: 1rem; margin-top: 1rem; }

        /* Admin Panel */
        .admin-panel { margin-top: 1.5rem; }
        .admin-section {
            background: #1a1a2e; border-radius: 16px; padding: 1.5rem;
            border: 1px solid #2a2a4a; margin-bottom: 1.5rem;
        }
        .admin-section h3 { margin-bottom: 1rem; color: #a0a0c0; font-size: 1rem; }
        .admin-add-form { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: flex-end; }
        .admin-add-form .input-group { flex: 1; min-width: 140px; }
        .admin-list { margin-top: 1.2rem; }
        .admin-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.7rem 1rem; background: #0f0f1a; border-radius: 8px;
            margin-bottom: 0.5rem; border: 1px solid #25253d;
        }
        .admin-item-info { flex: 1; }
        .admin-item-username { font-weight: 500; }
        .admin-item-date { color: #555577; font-size: 0.78rem; margin-top: 0.15rem; }
        .admin-empty { color: #555577; text-align: center; padding: 1.5rem; font-size: 0.9rem; }

        .video-list { margin-top: 2rem; }
        .video-list h3 { margin-bottom: 1rem; color: #a0a0c0; }
        .video-item {
            background: #1a1a2e; border-radius: 12px; padding: 1rem 1.5rem;
            margin-bottom: 0.75rem; display: flex; align-items: center;
            justify-content: space-between; border: 1px solid #2a2a4a; transition: all 0.3s;
        }
        .video-item:hover { border-color: #3a3a5a; }
        .video-item-info { flex: 1; }
        .video-item-title { font-weight: 500; margin-bottom: 0.25rem; }
        .video-item-meta { color: #6666888; font-size: 0.8rem; }

        .toast {
            position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem;
            border-radius: 12px; background: #1a1a2e; border: 1px solid #2a2a4a;
            color: #e0e0e0; font-size: 0.9rem; transform: translateY(100px);
            opacity: 0; transition: all 0.3s; z-index: 1000; max-width: 400px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: #2ed573; }
        .toast.error { border-color: #e74c3c; }
        .empty-state { text-align: center; padding: 2rem; color: #6666888; }
        .badge {
            display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px;
            font-size: 0.7rem; background: rgba(102,126,234,0.2); color: #8899dd;
            margin-left: 0.5rem;
        }

        @media (max-width: 600px) {
            .header { padding: 1rem; }
            .container { padding: 0 1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📹 视频上传端</h1>
        <div class="nav-links">
            <a href="upload.html" class="active">上传</a>
            <a href="view.html">观看</a>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <!-- Tabs -->
        <div class="tabs content-locked">
            <button class="tab-btn active" onclick="switchTab('upload')">📤 视频上传</button>
            <button class="tab-btn" onclick="switchTab('admin')">👥 管理副管理员</button>
        </div>

        <!-- Upload Tab -->
        <div class="tab-panel active content-locked" id="tab-upload">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <h2>拖拽视频文件到这里</h2>
                <p>或点击选择文件（支持 MP4, WebM, MOV, AVI，最大 100MB）</p>
                <input type="file" id="fileInput" accept="video/*" style="display: none;">
            </div>

            <div class="upload-form" id="uploadForm">
                <div class="file-info">
                    <span class="file-icon">🎬</span>
                    <div class="file-details">
                        <div class="file-name" id="fileName">-</div>
                        <div class="file-size" id="fileSize">-</div>
                    </div>
                    <button class="btn btn-secondary" onclick="cancelSelection()">取消</button>
                </div>
                <div class="form-group">
                    <label>视频标题</label>
                    <input type="text" id="videoTitle" placeholder="给视频起个名字">
                </div>
                <div class="form-group">
                    <label>视频描述（可选）</label>
                    <textarea id="videoDesc" placeholder="简单描述一下这个视频..."></textarea>
                </div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">准备上传...</div>
                <div class="upload-actions">
                    <button class="btn btn-primary" id="uploadBtn" onclick="startUpload()">开始上传</button>
                    <button class="btn btn-secondary" onclick="cancelSelection()">取消</button>
                </div>
            </div>

            <div class="video-list" id="videoList">
                <h3>已上传的视频</h3>
                <div id="videoListContent">
                    <div class="empty-state">连接 GitHub 后查看已上传的视频</div>
                </div>
            </div>
        </div>

        <!-- Admin Tab -->
        <div class="tab-panel" id="tab-admin">
            <div class="admin-section">
                <h3>➕ 添加副管理员</h3>
                <div class="admin-add-form">
                    <div class="input-group">
                        <label>账号名称</label>
                        <input type="text" id="newAdminUser" placeholder="副管理员用户名">
                    </div>
                    <div class="input-group">
                        <label>登录密码</label>
                        <input type="password" id="newAdminPass" placeholder="设置密码">
                    </div>
                    <button class="btn btn-primary" onclick="addSubAdmin()">添加</button>
                </div>
            </div>
            <div class="admin-section">
                <h3>📋 副管理员列表</h3>
                <div id="adminList" class="admin-list">
                    <div class="admin-empty">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Key Modal -->
    <div class="key-modal-overlay" id="keyModal">
        <div class="key-modal">
            <h3>🔐 管理员登录</h3>
            <p class="subtitle">请输入管理员密码</p>
            <input type="password" id="accessKey" placeholder="管理员密码" onkeydown="if(event.key==='Enter')checkKey()">
            <button class="btn btn-primary" onclick="checkKey()">进入</button>
        </div>
    </div>

    <script>
        const _p1='Z2hw',_p2='XzdSNm0xamdINTdK',_p3='ZFlsUmpyQllDM2k5',_p4='aVRvYTFNNDByNFNlRg==';
        const _tk=atob(_p1+_p2+_p3+_p4);
        let config={user:'wlbaaa',repo:'video-hub',token:_tk};
        let selectedFile=null;
        let subAdmins=[];

        function checkKey(){
            const key=document.getElementById('accessKey').value.trim();
            if(key==='Zz7983156'){unlock();}
            else{showToast('密码错误','error');}
        }

        function unlock(){
            document.getElementById('keyModal').classList.add('hidden');
            document.getElementById('mainContainer').classList.add('content-unlocked');
            validateToken();
        }

        async function validateToken(){
            try{
                await githubAPI('/repos/'+config.user+'/'+config.repo);
                showToast('连接成功','success');
                refreshVideoList();
                loadSubAdmins();
            }catch(error){
                showToast('连接失败: '+error.message,'error');
            }
        }

        function switchTab(tab){
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-'+tab).classList.add('active');
            if(tab==='admin') loadSubAdmins();
        }

        // SHA-256 hash
        async function sha256(msg){
            const buf=new TextEncoder().encode(msg);
            const hash=await crypto.subtle.digest('SHA-256',buf);
            return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
        }

        // --- Sub Admin Management ---
        async function loadAdminsData(){
            try{
                const data=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json');
                return JSON.parse(decodeBase64(data.content));
            }catch(e){return {sub_admins:[]};}
        }

        async function saveAdminsData(adminsData){
            const json=btoa(unescape(encodeURIComponent(JSON.stringify(adminsData,null,2))));
            let sha=null;
            try{
                const e=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json');
                sha=e.sha;
            }catch(e){}
            const body={message:'Update admins',content:json};
            if(sha) body.sha=sha;
            await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json',{method:'PUT',body:JSON.stringify(body)});
        }

        async function loadSubAdmins(){
            const data=await loadAdminsData();
            subAdmins=data.sub_admins||[];
            renderAdminList();
        }

        function renderAdminList(){
            const list=document.getElementById('adminList');
            if(subAdmins.length===0){
                list.innerHTML='<div class="admin-empty">暂无副管理员，请通过上方表单添加</div>';
                return;
            }
            list.innerHTML=subAdmins.map((a,i)=>'<div class="admin-item">'+
                '<div class="admin-item-info">'+
                '<span class="admin-item-username">'+escapeHtml(a.username)+'</span>'+
                '<div class="admin-item-date">添加于 '+new Date(a.created_at).toLocaleString('zh-CN')+'</div>'+
                '</div>'+
                '<button class="btn btn-danger btn-sm" onclick="removeSubAdmin('+i+')">移除</button>'+
            '</div>').join('');
        }

        async function addSubAdmin(){
            const username=document.getElementById('newAdminUser').value.trim();
            const password=document.getElementById('newAdminPass').value.trim();
            if(!username||!password){showToast('请填写账号和密码','error');return;}
            if(username.length<2){showToast('账号至少2个字符','error');return;}
            if(password.length<4){showToast('密码至少4个字符','error');return;}
            if(subAdmins.find(a=>a.username===username)){showToast('该账号已存在','error');return;}

            const hash=await sha256(password);
            const adminsData=await loadAdminsData();
            const newAdmin={
                username:username,
                password_hash:hash,
                created_at:new Date().toISOString()
            };
            adminsData.sub_admins.push(newAdmin);
            await saveAdminsData(adminsData);
            subAdmins.push(newAdmin);
            renderAdminList();
            document.getElementById('newAdminUser').value='';
            document.getElementById('newAdminPass').value='';
            showToast('副管理员 '+username+' 添加成功','success');
        }

        async function removeSubAdmin(index){
            if(!confirm('确定移除副管理员 '+subAdmins[index].username+' 吗？'))return;
            const adminsData=await loadAdminsData();
            adminsData.sub_admins.splice(index,1);
            await saveAdminsData(adminsData);
            subAdmins.splice(index,1);
            renderAdminList();
            showToast('已移除','success');
        }

        // --- File Upload ---
        const uploadArea=document.getElementById('uploadArea');
        const fileInput=document.getElementById('fileInput');
        uploadArea.addEventListener('click',()=>fileInput.click());
        uploadArea.addEventListener('dragover',(e)=>{e.preventDefault();uploadArea.classList.add('drag-over');});
        uploadArea.addEventListener('dragleave',()=>uploadArea.classList.remove('drag-over'));
        uploadArea.addEventListener('drop',(e)=>{
            e.preventDefault();uploadArea.classList.remove('drag-over');
            const files=e.dataTransfer.files;if(files.length>0)handleFile(files[0]);
        });
        fileInput.addEventListener('change',(e)=>{if(e.target.files.length>0)handleFile(e.target.files[0]);});

        function handleFile(file){
            if(!file.type.startsWith('video/')){showToast('请选择视频文件','error');return;}
            if(file.size>100*1024*1024){showToast('文件大小不能超过 100MB','error');return;}
            selectedFile=file;
            document.getElementById('fileName').textContent=file.name;
            document.getElementById('fileSize').textContent=formatSize(file.size);
            document.getElementById('videoTitle').value=file.name.replace(/\.[^/.]+$/,'');
            document.getElementById('uploadForm').classList.add('visible');
        }

        function cancelSelection(){
            selectedFile=null;fileInput.value='';
            document.getElementById('uploadForm').classList.remove('visible');
            document.getElementById('progressBar').classList.remove('visible');
            document.getElementById('progressText').classList.remove('visible');
        }

        async function startUpload(){
            if(!selectedFile)return;
            const title=document.getElementById('videoTitle').value.trim();
            const desc=document.getElementById('videoDesc').value.trim();
            if(!title){showToast('请输入视频标题','error');return;}

            const uploadBtn=document.getElementById('uploadBtn');
            const progressBar=document.getElementById('progressBar');
            const progressFill=document.getElementById('progressFill');
            const progressText=document.getElementById('progressText');
            uploadBtn.disabled=true;
            progressBar.classList.add('visible');
            progressText.classList.add('visible');
            progressText.textContent='正在读取文件...';
            progressFill.style.width='10%';

            try{
                const reader=new FileReader();
                const base64Promise=new Promise((resolve,reject)=>{
                    reader.onload=()=>resolve(reader.result.split(',')[1]);
                    reader.onerror=reject;
                });
                reader.readAsDataURL(selectedFile);
                const base64Content=await base64Promise;
                progressFill.style.width='40%';
                progressText.textContent='正在上传视频文件...';

                const safeFileName=selectedFile.name.replace(/[^a-zA-Z0-9._\-\u4e00-\u9fff]/g,'_');
                const videoPath='videos/'+Date.now()+'_'+safeFileName;
                await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/'+videoPath,{
                    method:'PUT',body:JSON.stringify({message:'Upload video: '+title,content:base64Content})
                });

                progressFill.style.width='70%';
                progressText.textContent='正在更新视频列表...';

                let videos=[];
                try{
                    const data=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json');
                    videos=JSON.parse(decodeBase64(data.content));
                }catch(e){}

                const videoEntry={
                    id:Date.now().toString(),title:title,description:desc,
                    path:videoPath,fileName:selectedFile.name,size:selectedFile.size,
                    uploadDate:new Date().toISOString(),
                    uploaded_by:'管理员'
                };
                videos.unshift(videoEntry);
                const videosJson=btoa(unescape(encodeURIComponent(JSON.stringify(videos,null,2))));

                let sha=null;
                try{const e=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json');sha=e.sha;}catch(e){}
                const body={message:'Add video: '+title,content:videosJson};
                if(sha)body.sha=sha;
                await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json',{method:'PUT',body:JSON.stringify(body)});

                progressFill.style.width='100%';
                progressText.textContent='上传完成！';
                showToast('视频上传成功','success');
                setTimeout(()=>{cancelSelection();document.getElementById('videoDesc').value='';refreshVideoList();},1500);
            }catch(error){
                console.error('Upload error:',error);
                progressText.textContent='上传失败';
                showToast('上传失败: '+error.message,'error');
                uploadBtn.disabled=false;
            }
        }

        async function githubAPI(endpoint,options={}){
            const url='https://api.github.com'+endpoint;
            const response=await fetch(url,{...options,headers:{
                'Authorization':'token '+config.token,
                'Accept':'application/vnd.github.v3+json',
                'Content-Type':'application/json',
                ...(options.headers||{})
            }});
            if(!response.ok){const ed=await response.json().catch(()=>({}));throw new Error(ed.message||'HTTP '+response.status);}
            return response.json();
        }

        async function getVideos(){
            try{
                const data=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json');
                return JSON.parse(decodeBase64(data.content));
            }catch(e){return [];}
        }

        function decodeBase64(str){return decodeURIComponent(escape(atob(str.replace(/\n/g,''))));}

        async function refreshVideoList(){
            const content=document.getElementById('videoListContent');
            try{
                const videos=await getVideos();
                if(videos.length===0){content.innerHTML='<div class="empty-state">还没有上传任何视频</div>';return;}
                content.innerHTML=videos.map(v=>'<div class="video-item"><div class="video-item-info">'+
                    '<div class="video-item-title">'+escapeHtml(v.title)+'</div>'+
                    '<div class="video-item-meta">'+formatSize(v.size)+' · '+
                    new Date(v.uploadDate).toLocaleString('zh-CN')+
                    ' · 上传者: '+escapeHtml(v.uploaded_by||'管理员')+'</div></div>'+
                    '<button class="btn btn-danger" style="padding:0.4rem 0.8rem;font-size:0.8rem;" onclick="deleteVideo(\''+v.id+'\')">删除</button></div>').join('');
            }catch(e){content.innerHTML='<div class="empty-state">加载失败，请检查配置</div>';}
        }

        async function deleteVideo(id){
            if(!confirm('确定要删除这个视频吗？'))return;
            try{
                const videos=await getVideos();
                const video=videos.find(v=>v.id===id);
                if(!video)throw new Error('视频未找到');
                const fileData=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/'+video.path);
                await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/'+video.path,{
                    method:'DELETE',body:JSON.stringify({message:'Delete video: '+video.title,sha:fileData.sha})
                });
                const updatedVideos=videos.filter(v=>v.id!==id);
                const vj=btoa(unescape(encodeURIComponent(JSON.stringify(updatedVideos,null,2))));
                const md=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json');
                await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json',{
                    method:'PUT',body:JSON.stringify({message:'Remove video: '+video.title,content:vj,sha:md.sha})
                });
                showToast('视频已删除','success');refreshVideoList();
            }catch(error){showToast('删除失败: '+error.message,'error');}
        }

        function formatSize(b){if(!b||b===0)return'0 B';const k=1024;const s=['B','KB','MB','GB'];const i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i];}
        function escapeHtml(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
        function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3000);}
    </script>
</body>
</html>
