<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频上传与管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f1a; color: #e0e0e0; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1.2rem 2rem; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #2a2a4a; flex-wrap: wrap; gap: 1rem;
        }
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-links a {
            color: #a0a0c0; text-decoration: none; padding: 0.5rem 1rem;
            border-radius: 8px; transition: all 0.3s;
        }
        .nav-links a:hover { color: #fff; background: rgba(102,126,234,0.15); }
        .nav-links a.active { color: #667eea; background: rgba(102,126,234,0.15); }

        .key-modal-overlay {
            display: flex; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); z-index: 2000; align-items: center;
            justify-content: center; padding: 1rem;
        }
        .key-modal-overlay.hidden { display: none !important; }
        .key-modal {
            background: #1a1a2e; border-radius: 16px; padding: 2rem;
            border: 1px solid #2a2a4a; text-align: center; max-width: 360px; width: 100%;
        }
        .key-modal h3 { margin-bottom: 0.3rem; color: #e0e0e0; font-size: 1.1rem; }
        .key-modal .subtitle { color: #8888aa; font-size: 0.85rem; margin-bottom: 1.2rem; }
        .key-modal input {
            width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px;
            padding: 0.85rem 1rem; color: #e0e0e0; font-size: 0.95rem; text-align: center;
            outline: none; transition: border-color 0.3s; margin-bottom: 0.7rem;
        }
        .key-modal input:focus { border-color: #667eea; }

        .container { max-width: 1000px; margin: 1.5rem auto; padding: 0 1.5rem; }
        .container.locked .content-locked { display: none !important; }
        .tabs {
            display: flex; gap: 0.3rem; margin-bottom: 1.5rem;
            background: #1a1a2e; border-radius: 12px; padding: 0.3rem;
        }
        .tab {
            flex: 1; padding: 0.7rem 1.2rem; text-align: center; cursor: pointer;
            border-radius: 10px; font-size: 0.9rem; transition: all 0.3s;
            color: #8888aa; border: none; background: transparent;
        }
        .tab.active { background: rgba(102,126,234,0.2); color: #667eea; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .btn {
            padding: 0.7rem 1.5rem; border: none; border-radius: 8px;
            font-size: 0.95rem; cursor: pointer; transition: all 0.3s; font-weight: 500;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .btn-primary:disabled {
            opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none;
        }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .btn-ghost { background: none; color: #8888aa; border: 1px solid #2a2a4a; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; color: #a0a0c0; font-size: 0.9rem; }
        .form-group input, .form-group textarea {
            width: 100%; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px;
            padding: 0.75rem 1rem; color: #e0e0e0; font-size: 0.95rem; outline: none;
            transition: border-color 0.3s; resize: vertical;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #667eea; }
        .form-group textarea { min-height: 80px; }
        .form-group input[type="file"] {
            padding: 0.6rem; color: #8888aa;
        }
        .form-group input[type="file"]::file-selector-button {
            background: #2a2a4a; color: #ccc; border: none; padding: 0.4rem 0.8rem;
            border-radius: 6px; cursor: pointer; margin-right: 0.5rem;
        }
        .upload-area {
            background: #1a1a2e; border: 2px dashed #2a2a4a; border-radius: 16px;
            padding: 2rem; text-align: center; transition: border-color 0.3s;
        }
        .upload-area:hover, .upload-area.dragover { border-color: #667eea; }
        .upload-area .icon { font-size: 3rem; margin-bottom: 0.5rem; }

        .progress-bar {
            width: 100%; height: 8px; background: #2a2a4a; border-radius: 4px;
            overflow: hidden; margin: 0.5rem 0;
        }
        .progress-bar .fill {
            height: 100%; background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px; transition: width 0.3s; width: 0;
        }

        .card {
            background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 1.2rem;
            margin-bottom: 0.8rem;
        }
        .admin-item {
            display: flex; justify-content: space-between; align-items: center;
        }
        .admin-item .info { flex: 1; }
        .admin-item .name { font-weight: 600; }
        .admin-item .time { font-size: 0.8rem; color: #555577; }

        /* Chat */
        .chat-card {
            background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; margin-bottom: 0.8rem;
        }
        .chat-card-header {
            padding: 0.8rem 1.2rem; border-bottom: 1px solid #2a2a4a;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .chat-card-header h4 { font-size: 0.95rem; }
        .chat-card-body {
            padding: 1rem; max-height: 300px; overflow-y: auto; display: flex;
            flex-direction: column; gap: 0.5rem;
        }
        .chat-card-body.collapsed { display: none; }
        .chat-msg-bubble {
            max-width: 80%; padding: 0.5rem 0.8rem; border-radius: 10px; font-size: 0.85rem;
            line-height: 1.4; word-break: break-word;
        }
        .chat-msg-bubble.from-admin {
            align-self: flex-end; background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }
        .chat-msg-bubble.to-admin {
            align-self: flex-start; background: #252540; color: #ccc;
        }
        .chat-reply-area {
            padding: 0.8rem 1rem; border-top: 1px solid #2a2a4a; display: flex; gap: 0.5rem;
        }
        .chat-reply-area input {
            flex: 1; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px;
            padding: 0.5rem 0.8rem; color: #e0e0e0; font-size: 0.85rem; outline: none;
        }
        .chat-reply-area input:focus { border-color: #667eea; }

        table {
            width: 100%; border-collapse: collapse; margin-top: 1rem;
        }
        th, td {
            text-align: left; padding: 0.8rem; border-bottom: 1px solid #2a2a4a;
            font-size: 0.9rem;
        }
        th { color: #8888aa; font-weight: 500; }
        td .btn { margin-right: 0.3rem; }

        .toast {
            position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem;
            border-radius: 12px; background: #1a1a2e; border: 1px solid #2a2a4a;
            color: #e0e0e0; font-size: 0.9rem; transform: translateY(100px);
            opacity: 0; transition: all 0.3s; z-index: 2000; max-width: 400px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: #e74c3c; }

        @media (max-width: 600px) {
            .header { padding: 1rem; }
            .container { padding: 0 1rem; }
            .tabs { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📤 上传管理</h1>
        <div class="nav-links">
            <a href="index.html">主页</a>
            <a href="upload.html" class="active">上传</a>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <div class="key-modal-overlay" id="keyModal">
            <div class="key-modal">
                <h3>🔐 请输入访问密码</h3>
                <p class="subtitle">请输入预设密码</p>
                <input type="password" id="accessKey" placeholder="输入密码" onkeydown="if(event.key==='Enter')checkKey()">
                <button class="btn btn-primary" onclick="checkKey()">验证</button>
            </div>
        </div>

        <div class="content-locked" id="content" style="display:none;">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('upload')">📤 视频上传</button>
                <button class="tab" onclick="switchTab('admins')">👥 管理副管理员</button>
                <button class="tab" onclick="switchTab('messages')">💬 消息中心</button>
                <button class="tab" onclick="switchTab('registrations')">📋 注册审核</button>
            </div>

            <!-- Upload Tab -->
            <div class="tab-panel active" id="tab-upload">
                <div class="upload-area" id="uploadArea">
                    <div class="icon">📁</div>
                    <p>点击或拖拽视频文件到此处上传</p>
                    <input type="file" id="fileInput" accept="video/*" multiple style="display:none;" onchange="handleFiles(this.files)">
                    <p style="color:#555577;font-size:0.8rem;margin-top:0.5rem;">支持 MP4, MOV, AVI, MKV 等格式</p>
                </div>
                <div class="form-group" style="margin-top:1rem;">
                    <label>视频标题</label>
                    <input type="text" id="videoTitle" placeholder="输入视频标题">
                </div>
                <div class="form-group">
                    <label>视频描述</label>
                    <textarea id="videoDesc" placeholder="输入视频描述（可选）"></textarea>
                </div>
                <div class="progress-bar" id="progressBar" style="display:none;">
                    <div class="fill" id="progressFill"></div>
                </div>
                <p id="progressText" style="color:#555577;font-size:0.85rem;margin-top:0.3rem;display:none;"></p>

                <h3 style="margin:1.5rem 0 1rem;">已上传视频</h3>
                <div id="videoList">
                    <div style="color:#555577;text-align:center;padding:2rem;">加载中...</div>
                </div>
            </div>

            <!-- Admins Tab -->
            <div class="tab-panel" id="tab-admins">
                <div class="card">
                    <h3 style="margin-bottom:1rem;">添加副管理员</h3>
                    <div class="form-group">
                        <label>账号名称</label>
                        <input type="text" id="adminName" placeholder="副管理员账号">
                    </div>
                    <div class="form-group">
                        <label>登录密码</label>
                        <input type="password" id="adminPass" placeholder="设置登录密码">
                    </div>
                    <button class="btn btn-primary" onclick="addSubAdmin()">添加副管理员</button>
                </div>
                <h3 style="margin-bottom:0.5rem;">副管理员列表</h3>
                <div id="adminList">
                    <div style="color:#555577;text-align:center;padding:2rem;">加载中...</div>
                </div>
            </div>

            <!-- Messages Tab -->
            <div class="tab-panel" id="tab-messages">
                <h3 style="margin-bottom:1rem;">消息中心</h3>
                <div id="msgPanel">
                    <div style="color:#555577;text-align:center;padding:2rem;">加载中...</div>
                </div>
            </div>

            <!-- Registrations Tab -->
            <div class="tab-panel" id="tab-registrations">
                <h3 style="margin-bottom:1rem;">注册审核</h3>
                <div id="regPanel">
                    <div style="color:#555577;text-align:center;padding:2rem;">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const _p1='Z2hw',_p2='XzdSNm0xamdINTdK',_p3='ZFlsUmpyQllDM2k5',_p4='aVRvYTFNNDByNFNlRg==';
        const _tk=atob(_p1+_p2+_p3+_p4);
        let config={user:'wlbaaa',repo:'video-hub',token:_tk};
        let pendingFiles=[];

        document.getElementById('uploadArea').addEventListener('click',()=>document.getElementById('fileInput').click());
        const ua=document.getElementById('uploadArea');
        ua.addEventListener('dragover',e=>{e.preventDefault();ua.classList.add('dragover');});
        ua.addEventListener('dragleave',()=>ua.classList.remove('dragover'));
        ua.addEventListener('drop',e=>{e.preventDefault();ua.classList.remove('dragover');handleFiles(e.dataTransfer.files);});

        async function checkKey(){
            const key=document.getElementById('accessKey').value.trim();
            if(key==='Zz7983156'){
                document.getElementById('keyModal').classList.add('hidden');
                document.getElementById('content').style.display='block';
                validateToken();
            }else{
                showToast('密码错误','error');
            }
        }

        async function validateToken(){
            try{
                await githubAPI('/repos/'+config.user+'/'+config.repo);
                loadVideoList();loadAdmins();
            }catch(e){showToast('GitHub连接失败: '+e.message,'error');}
        }

        function handleFiles(files){
            if(!files||files.length===0)return;
            for(const f of files){
                if(!f.type.startsWith('video/')){showToast(f.name+' 不是视频文件','error');continue;}
                pendingFiles.push(f);
                const title=document.getElementById('videoTitle').value.trim()||f.name.replace(/\.[^.]+$/,'');
                const desc=document.getElementById('videoDesc').value.trim();
                uploadVideo(f,title,desc);
            }
        }

        async function uploadVideo(file,title,desc){
            const pb=document.getElementById('progressBar');
            const pf=document.getElementById('progressFill');
            const pt=document.getElementById('progressText');
            pb.style.display='block';pt.style.display='block';pt.textContent='正在上传 '+file.name+'...';
            pf.style.width='0';

            try{
                const safeName=Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
                const path='videos/'+safeName;
                const base64Content=btoa(String.fromCharCode(...new Uint8Array(await file.arrayBuffer())));
                pf.style.width='30%';
                const body={message:'Upload '+file.name,content:base64Content};
                const res=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/'+path,{method:'PUT',body:JSON.stringify(body)});
                pf.style.width='70%';
                pt.textContent='正在更新视频列表...';

                let videos=[];
                try{
                    const vd=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json');
                    videos=JSON.parse(decodeBase64(vd.content));
                }catch(e){}
                videos.push({
                    id:res.content.sha.substring(0,8),
                    title:title,description:desc,path:path,
                    size:file.size,uploadDate:new Date().toISOString(),
                    sha:res.content.sha,uploaded_by:'管理员'
                });
                const vjson=btoa(unescape(encodeURIComponent(JSON.stringify(videos,null,2))));
                let vsha=null;
                try{const e=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json');vsha=e.sha;}catch(e){}
                const vbody={message:'Update video list',content:vjson};if(vsha)vbody.sha=vsha;
                await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json',{method:'PUT',body:JSON.stringify(vbody)});

                pf.style.width='100%';
                showToast('上传成功: '+title);
                loadVideoList();
                document.getElementById('videoTitle').value='';
                document.getElementById('videoDesc').value='';
            }catch(e){
                showToast('上传失败: '+e.message,'error');
            }
            setTimeout(()=>{pb.style.display='none';pt.style.display='none';},2000);
        }

        async function loadVideoList(){
            const el=document.getElementById('videoList');
            try{
                const data=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json');
                const videos=JSON.parse(decodeBase64(data.content));
                if(videos.length===0){el.innerHTML='<div style="color:#555577;text-align:center;padding:2rem;">暂无视频</div>';return;}
                el.innerHTML='<table><thead><tr><th>标题</th><th>大小</th><th>上传时间</th><th>操作</th></tr></thead><tbody>'+
                    videos.map(v=>'<tr><td>'+escapeHtml(v.title)+'</td><td>'+formatSize(v.size)+'</td><td>'+formatDate(v.uploadDate)+'</td><td><button class="btn btn-danger btn-sm" onclick="deleteVideo(\''+v.id+'\')">删除</button></td></tr>').join('')+
                    '</tbody></table>';
                window._videos=videos;
            }catch(e){el.innerHTML='<div style="color:#555577;text-align:center;padding:2rem;">暂无视频</div>';}
        }

        async function deleteVideo(id){
            const videos=window._videos||[];
            const v=videos.find(v=>v.id===id);
            if(!v)return;
            if(!confirm('确定删除视频 "'+v.title+'" 吗？'))return;
            try{
                const d=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/'+v.path);
                await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/'+v.path,{method:'DELETE',body:JSON.stringify({message:'Delete '+v.title,sha:d.sha})});
                const nd=videos.filter(v=>v.id!==id);
                const vjson=btoa(unescape(encodeURIComponent(JSON.stringify(nd,null,2))));
                const vd=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json');
                await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/videos.json',{method:'PUT',body:JSON.stringify({message:'Update video list',content:vjson,sha:vd.sha})});
                showToast('已删除: '+v.title);loadVideoList();
            }catch(e){showToast('删除失败: '+e.message,'error');}
        }

        // Sub admins
        let subAdmins=[];
        async function loadAdmins(){
            try{
                const data=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json');
                const adminsData=JSON.parse(decodeBase64(data.content));
                subAdmins=adminsData.sub_admins||[];
                renderAdminList();
            }catch(e){subAdmins=[];renderAdminList();}
        }

        function renderAdminList(){
            const el=document.getElementById('adminList');
            if(subAdmins.length===0){el.innerHTML='<div style="color:#555577;text-align:center;padding:2rem;">暂无副管理员</div>';return;}
            el.innerHTML=subAdmins.map((a,i)=>'<div class="card admin-item"><div class="info"><div class="name">'+escapeHtml(a.username)+'</div><div class="time">创建于 '+formatDate(a.created_at)+'</div></div><button class="btn btn-danger btn-sm" onclick="removeSubAdmin('+i+')">移除</button></div>').join('');
        }

        async function sha256(msg){
            const buf=new TextEncoder().encode(msg);
            const hash=await crypto.subtle.digest('SHA-256',buf);
            return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
        }

        async function addSubAdmin(){
            const name=document.getElementById('adminName').value.trim();
            const pass=document.getElementById('adminPass').value.trim();
            if(!name||!pass){showToast('请填写账号和密码','error');return;}
            if(subAdmins.find(a=>a.username===name)){showToast('该账号已存在','error');return;}
            const hash=await sha256(pass);
            const newAdmin={username:name,password_hash:hash,created_at:new Date().toISOString()};
            subAdmins.push(newAdmin);
            const json=btoa(unescape(encodeURIComponent(JSON.stringify({sub_admins:subAdmins},null,2))));
            let sha=null;
            try{const d=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json');sha=d.sha;}catch(e){}
            const body={message:'Add sub admin '+name,content:json};if(sha)body.sha=sha;
            await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json',{method:'PUT',body:JSON.stringify(body)});
            showToast('副管理员 '+name+' 已添加');
            document.getElementById('adminName').value='';
            document.getElementById('adminPass').value='';
            renderAdminList();
        }

        async function removeSubAdmin(index){
            const admin=subAdmins[index];
            if(!confirm('确定移除副管理员 "'+admin.username+'" 吗？'))return;
            subAdmins.splice(index,1);
            const json=btoa(unescape(encodeURIComponent(JSON.stringify({sub_admins:subAdmins},null,2))));
            const d=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json');
            await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json',{method:'PUT',body:JSON.stringify({message:'Remove sub admin '+admin.username,content:json,sha:d.sha})});
            showToast('已移除: '+admin.username);renderAdminList();
        }

        // Messages
        async function loadMessagesPanel(){
            const panel=document.getElementById('msgPanel');
            try{
                const data=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/messages.json');
                const all=JSON.parse(decodeBase64(data.content));
                const msgs=all.messages||[];
                if(msgs.length===0){panel.innerHTML='<div style="color:#555577;text-align:center;padding:2rem;">暂无消息</div>';return;}
                // Group by sender
                const grouped={};
                msgs.forEach(m=>{
                    const key=m.from==='管理员'?m.to:m.from;
                    if(!grouped[key])grouped[key]=[];
                    grouped[key].push(m);
                });
                panel.innerHTML=Object.entries(grouped).map(([user,userMsgs])=>{
                    const mhtml=userMsgs.map(m=>{
                        const isAdmin=m.from==='管理员';
                        return '<div class="chat-msg-bubble '+(isAdmin?'from-admin':'to-admin')+'">'+
                            '<div style="font-size:0.72rem;color:#8899dd;">'+(isAdmin?'管理员 → '+escapeHtml(m.to):escapeHtml(m.from)+' → 管理员')+'</div>'+
                            '<div>'+escapeHtml(m.content)+'</div>'+
                            '<div style="font-size:0.68rem;color:#666;text-align:right;">'+formatTime(m.timestamp)+'</div>'+
                            '</div>';
                    }).join('');
                    return '<div class="chat-card">'+
                        '<div class="chat-card-header" onclick="toggleChatCard(this)"><h4>💬 '+escapeHtml(user)+' <span style="font-size:0.75rem;color:#555577;">('+userMsgs.length+'条)</span></h4><span style="color:#8888aa;">▼</span></div>'+
                        '<div class="chat-card-body">'+mhtml+'</div>'+
                        '<div class="chat-reply-area"><input type="text" placeholder="回复 '+escapeHtml(user)+'..." data-user="'+escapeHtml(user)+'" onkeydown="if(event.key==='Enter')adminReply(this)"><button class="btn btn-primary btn-sm" onclick="adminReply(this.previousElementSibling)">发送</button></div>'+
                        '</div>';
                }).join('');
            }catch(e){panel.innerHTML='<div style="color:#555577;text-align:center;padding:2rem;">暂无消息</div>';}
        }

        async function adminReply(input){
            const toUser=input.getAttribute('data-user');
            const content=input.value.trim();
            if(!content)return;
            input.value='';
            try{
                let data={messages:[]};
                try{
                    const d=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/messages.json');
                    data=JSON.parse(decodeBase64(d.content));
                }catch(e){}
                data.messages.push({
                    id:Date.now().toString(),from:'管理员',to:toUser,
                    content:content,timestamp:new Date().toISOString()
                });
                const json=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
                let sha=null;
                try{const d=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/messages.json');sha=d.sha;}catch(e){}
                const body={message:'Admin reply to '+toUser,content:json};if(sha)body.sha=sha;
                await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/messages.json',{method:'PUT',body:JSON.stringify(body)});
                showToast('已回复 '+toUser);
                loadMessagesPanel();
            }catch(e){showToast('发送失败: '+e.message,'error');}
        }

        function toggleChatCard(header){
            const body=header.nextElementSibling;
            body.classList.toggle('collapsed');
            header.querySelector('span:last-child').textContent=body.classList.contains('collapsed')?'▶':'▼';
        }

        function switchTab(name){
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
            document.querySelector('.tab[onclick*="'+name+'"]').classList.add('active');
            document.getElementById('tab-'+name).classList.add('active');
            if(name==='admins')loadAdmins();
            if(name==='messages')loadMessagesPanel();
            if(name==='registrations')loadRegistrations();
        }

        // Registration review
        async function loadRegistrations(){
            const panel=document.getElementById('regPanel');
            try{
                const d=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/registrations.json');
                const regs=JSON.parse(decodeBase64(d.content)).registrations||[];
                if(regs.length===0){panel.innerHTML='<div style="color:#555577;text-align:center;padding:2rem;">暂无注册申请</div>';return;}
                panel.innerHTML=regs.map((r,i)=>{
                    return '<div class="card admin-item"><div class="info"><div class="name">'+escapeHtml(r.username)+'</div><div style="color:#888;font-size:0.85rem;margin-top:0.2rem;">'+(r.note?escapeHtml(r.note):'无备注')+'</div><div class="time">申请于 '+formatDate(r.submitted_at)+'</div></div><div style="display:flex;gap:0.5rem;"><button class="btn btn-primary btn-sm" onclick="approveReg(\''+escapeHtml(r.username)+'\')">通过</button><button class="btn btn-danger btn-sm" onclick="rejectReg('+i+')">拒绝</button></div></div>';
                }).join('');
            }catch(e){panel.innerHTML='<div style="color:#555577;text-align:center;padding:2rem;">暂无注册申请</div>';}
        }

        async function approveReg(username){
            try{
                // Get registration data
                const rd=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/registrations.json');
                const rdata=JSON.parse(decodeBase64(rd.content));
                const regIdx=rdata.registrations.findIndex(r=>r.username===username);
                if(regIdx===-1)return;
                const reg=rdata.registrations[regIdx];

                // Add to admins.json
                let admins={sub_admins:[]};
                let asha=null;
                try{const ad=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json');admins=JSON.parse(decodeBase64(ad.content));asha=ad.sha;}catch(e){}
                admins.sub_admins.push({username:reg.username,password_hash:reg.password_hash,created_at:new Date().toISOString(),note:reg.note||''});
                const ajson=btoa(unescape(encodeURIComponent(JSON.stringify(admins,null,2))));
                const abody={message:'Approve '+username,content:ajson};if(asha)abody.sha=asha;
                await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/admins.json',{method:'PUT',body:JSON.stringify(abody)});

                // Remove from registrations
                rdata.registrations.splice(regIdx,1);
                const rjson=btoa(unescape(encodeURIComponent(JSON.stringify(rdata,null,2))));
                await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/registrations.json',{method:'PUT',body:JSON.stringify({message:'Approve '+username,content:rjson,sha:rd.sha})});

                showToast(username+' 已通过审核');loadRegistrations();loadAdmins();
            }catch(e){showToast('操作失败: '+e.message,'error');}
        }

        async function rejectReg(index){
            try{
                const rd=await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/registrations.json');
                const rdata=JSON.parse(decodeBase64(rd.content));
                const username=rdata.registrations[index].username;
                rdata.registrations.splice(index,1);
                const rjson=btoa(unescape(encodeURIComponent(JSON.stringify(rdata,null,2))));
                await githubAPI('/repos/'+config.user+'/'+config.repo+'/contents/registrations.json',{method:'PUT',body:JSON.stringify({message:'Reject '+username,content:rjson,sha:rd.sha})});
                showToast('已拒绝 '+username);loadRegistrations();
            }catch(e){showToast('操作失败: '+e.message,'error');}
        }

        async function githubAPI(endpoint,options={}){
            const url='https://api.github.com'+endpoint;
            const response=await fetch(url,{...options,headers:{
                'Authorization':'token '+config.token,
                'Accept':'application/vnd.github.v3+json',
                'Content-Type':'application/json',
                ...(options.headers||{})
            }});
            if(!response.ok){const ed=await response.json().catch(()=>({}));throw new Error(ed.message||'HTTP '+response.status);}
            return response.json();
        }

        function decodeBase64(str){return decodeURIComponent(escape(atob(str.replace(/\n/g,''))));}
        function formatSize(b){if(!b||b===0)return'0 B';const k=1024;const s=['B','KB','MB','GB'];const i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i];}
        function formatDate(isoStr){if(!isoStr)return'';const d=new Date(isoStr);return d.toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'});}
        function formatTime(isoStr){if(!isoStr)return'';const d=new Date(isoStr);return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});}
        function escapeHtml(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
        function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3000);}
    </script>
</body>
</html>
